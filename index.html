<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMULADOR DE PREPAGO HIPOTECARIO</title>

  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Chart.js y react-chartjs-2 (Más estable para uso directo sin Node.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-chartjs-2@5.2.0/dist/index.umd.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- CSS Premium -->
  <link rel="stylesheet" href="App.css">

  <!-- (pdf libraries removed: using browser print instead) -->
</head>

<body>

  <div id="root"></div>
  <div id="error-log"
    style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 16px;"></div>

  <script>
    window.addEventListener('error', function (event) {
      document.getElementById('error-log').innerText += 'Error: ' + event.message + '\n';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.getElementById('error-log').innerText += 'Promise Error: ' + event.reason + '\n';
    });
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ── FORMATEADOR CLP ─────────────────────────────────────────────────────────
    const fmtCLP = (n) => n?.toLocaleString("es-CL", { style: "currency", currency: "CLP", minimumFractionDigits: 0, maximumFractionDigits: 0 });

    const chartColors = {
      sinPrepago: "#64748b", // Slate 500
      conPrepagoPlazo: "#3b82f6", // Blue 500
      conPrepagoCuota: "#10b981", // Emerald 500
      grid: "rgba(148,163,184,0.05)",
      text: "#94a3b8",
      card: "#0f172a",
    };

    // ── HELPERS FINANCIEROS (Corregidos) ─────────────────────────────────────────
    const tasaMensual = (tna) => Math.pow(1 + tna / 100, 1 / 12) - 1;

    const cuotaMensual = (capital, tna, meses) => {
      const r = tasaMensual(tna);
      if (r === 0) return capital / meses;
      return (capital * r * Math.pow(1 + r, meses)) / (Math.pow(1 + r, meses) - 1);
    };

    const calcularSaldoActual = (capital, tna, plazoTotal, mesesPagados) => {
      const r = tasaMensual(tna);
      const cuota = cuotaMensual(capital, tna, plazoTotal);
      let saldo = capital;
      for (let i = 0; i < mesesPagados; i++) saldo -= cuota - saldo * r;
      return Math.max(saldo, 0);
    };

    const calcularInteresesTotales = (saldo, tna, meses) => {
      if (meses <= 0 || saldo <= 0) return 0;
      return cuotaMensual(saldo, tna, meses) * meses - saldo;
    };

    const simularPrepago = (saldoActual, tna, mesesRestantes, montoPrepago, frecuencia, mesInicio, destino, cuotaBase, costoPrepago = 0) => {
      const r = tasaMensual(tna);
      let saldo = saldoActual;
      let mes = 0;
      let totalIntereses = 0;
      let totalPrepagado = 0;
      let totalMultas = 0;
      let prepagosRealizados = 0;
      const evolucionSin = [];
      const evolucionCon = [];
      const cuotasAnualesSin = {};
      const cuotasAnualesCon = {};

      let saldoSin = saldoActual;
      for (let i = 0; i < mesesRestantes; i++) {
        const intSin = saldoSin * r;
        const cuotaSin = cuotaBase; // The base scenario quota is constant
        saldoSin -= Math.min(cuotaSin - intSin, saldoSin);
        evolucionSin.push({ mes: i + 1, saldo: Math.max(saldoSin, 0) });

        const ano = Math.floor(i / 12) + 1;
        cuotasAnualesSin[ano] = cuotaSin; // Toma la última cuota del año como rep.
      }

      let cuotaActual = cuotaBase;

      while (saldo > 0.01 && mes < mesesRestantes + 1) {
        const mesRelativo = mes - mesInicio;
        const esPrepago = mesRelativo >= 0 && montoPrepago > 0 && (
          frecuencia === "mensual" ||
          (frecuencia === "semestral" && mesRelativo % 6 === 0) ||
          (frecuencia === "anual" && mesRelativo % 12 === 0)
        );

        if (esPrepago) {
          const p = Math.min(montoPrepago, saldo);
          saldo -= p;
          totalPrepagado += p;
          prepagosRealizados++;
          totalMultas += costoPrepago * saldo * r; // Costo por cada prepago

          // Only recalculate quota when prepaying to reduce quota
          if (destino === "cuota" && saldo > 0.01) {
            const mesesRest = Math.max(mesesRestantes - mes, 1);
            cuotaActual = cuotaMensual(saldo, tna, mesesRest);
          }
        }

        if (saldo <= 0.01) break;

        const intMes = saldo * r;
        saldo -= Math.min(cuotaActual - intMes, saldo);
        totalIntereses += intMes;
        mes++;
        evolucionCon.push({ mes, saldo: Math.max(saldo, 0) });

        const ano = Math.floor((mes - 1) / 12) + 1;
        cuotasAnualesCon[ano] = cuotaActual;
      }

      const maxAno = Math.max(...Object.keys(cuotasAnualesSin).map(Number));
      const evolucionCuota = [];
      for (let i = 1; i <= maxAno; i++) {
        evolucionCuota.push({
          ano: i,
          cuotaSin: cuotasAnualesSin[i] || 0,
          cuotaCon: cuotasAnualesCon[i] || 0
        });
      }

      const nuevaCuota = destino === "cuota" ? cuotaMensual(saldoActual - montoPrepago, tna, mesesRestantes) : cuotaBase;

      return { mesesReales: mes, totalIntereses, totalPrepagado, totalMultas, prepagosRealizados, evolucionSin, evolucionCon, nuevaCuota, evolucionCuota };
    };

    const costosPrepagoOpciones = [
      { value: "1.5", label: "1,5 meses de interés por prepago" },
      { value: "0", label: "Sin costo de prepago" }
    ];

    const fmt = (n, d = 1) => n?.toLocaleString("es-CL", { minimumFractionDigits: d, maximumFractionDigits: d });
    const fmtM = (m) => {
      const a = Math.floor(m / 12), mo = m % 12;
      return a > 0 ? `${a} ${a === 1 ? "Año" : "Años"} ${mo > 0 ? mo + " " + (mo === 1 ? "Mes" : "Meses") : ""}`.trim() : `${mo} ${mo === 1 ? "Mes" : "Meses"}`;
    };

    // ── COMPONENTES UI ──────────────────────────────────────────────────────────
    const Input = ({ label, value, onChange, min, max, step = "any", prefix, suffix }) => (
      <div className="input-group">
        <label className="input-label">{label}</label>
        <div className="input-wrapper">
          {prefix && <span className="input-prefix">{prefix}</span>}
          <input type="number" className="styled-input" value={value} onChange={e => onChange(e.target.value)} min={min} max={max} step={step} />
          {suffix && <span className="input-suffix">{suffix}</span>}
        </div>
      </div>
    );

    const Select = ({ label, value, onChange, options }) => (
      <div className="input-group">
        <label className="input-label">{label}</label>
        <div className="input-wrapper">
          <select className="styled-input" value={value} onChange={e => onChange(e.target.value)}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      </div>
    );

    const Stat = ({ label, value, sub, colorClass = "cyan", big }) => (
      <div className={`stat-box ${colorClass}`}>
        <div className="stat-label">{label}</div>
        <div className={`stat-value ${big ? 'big' : ''}`}>{value}</div>
        {sub && <div className="stat-sub">{sub}</div>}
      </div>
    );

    // ── GRÁFICO (NATIVE CHART.JS) ────────────────────────────────────────────────
    const GraficoSaldo = ({ evolucionSin, evolucionPlazo, evolucionCuota, mesesRestantes, saldoInicial, cr }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current || !cr) return;

        const dataMap = {};
        const mp = +cr.mesesPagados;
        const r = tasaMensual(+cr.tna);
        const cuota = cuotaMensual(+cr.capital, +cr.tna, +cr.plazo);

        let saldoHist = +cr.capital;
        for (let i = 0; i <= mp; i++) {
          dataMap[i] = { mes: i, sinPrepago: Math.round(saldoHist), conPrepagoPlazo: Math.round(saldoHist), conPrepagoCuota: Math.round(saldoHist) };
          if (i < mp) saldoHist -= Math.min(cuota - saldoHist * r, saldoHist);
        }

        evolucionSin.forEach(p => {
          const m = p.mes + mp;
          if (!dataMap[m]) dataMap[m] = { mes: m };
          dataMap[m].sinPrepago = Math.round(p.saldo);
        });

        if (evolucionPlazo) {
          evolucionPlazo.forEach(p => {
            const m = p.mes + mp;
            if (!dataMap[m]) dataMap[m] = { mes: m };
            dataMap[m].conPrepagoPlazo = Math.round(p.saldo);
          });
        }
        
        if (evolucionCuota) {
          evolucionCuota.forEach(p => {
            const m = p.mes + mp;
            if (!dataMap[m]) dataMap[m] = { mes: m };
            dataMap[m].conPrepagoCuota = Math.round(p.saldo);
          });
        }

        const rawData = Object.values(dataMap).sort((a, b) => a.mes - b.mes);
        const labels = rawData.map(d => {
          if (d.mes === 0) return "Inicio";
          if (d.mes === mp) return "Hoy";
          if (d.mes % 12 === 0) return `Año ${d.mes / 12}`;
          return d.mes;
        });

        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = chartRef.current.getContext('2d');

        // Create Gradients for Corporate Look
        const gradSin = ctx.createLinearGradient(0, 0, 0, 400);
        gradSin.addColorStop(0, 'rgba(100, 116, 139, 0.3)');
        gradSin.addColorStop(1, 'rgba(100, 116, 139, 0.01)');

        const gradPlazo = ctx.createLinearGradient(0, 0, 0, 400);
        gradPlazo.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
        gradPlazo.addColorStop(1, 'rgba(59, 130, 246, 0.02)');

        const gradCuota = ctx.createLinearGradient(0, 0, 0, 400);
        gradCuota.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
        gradCuota.addColorStop(1, 'rgba(16, 185, 129, 0.02)');

        chartInstance.current = new window.Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Sin Prepago',
                data: rawData.map(d => d.sinPrepago),
                borderColor: chartColors.sinPrepago,
                backgroundColor: gradSin,
                borderWidth: 2,
                borderDash: [5, 5],
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 6,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#0f172a', // Corporate dark background
                tension: 0.4
              },
              {
                label: 'Reduce Plazo',
                data: rawData.map(d => d.conPrepagoPlazo),
                borderColor: chartColors.conPrepagoPlazo,
                backgroundColor: gradPlazo,
                borderWidth: 3,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 8,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#0f172a', // Corporate dark background
                tension: 0.4
              },
              {
                label: 'Reduce Cuota',
                data: rawData.map(d => d.conPrepagoCuota),
                borderColor: chartColors.conPrepagoCuota,
                backgroundColor: gradCuota,
                borderWidth: 3,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 8,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#0f172a', // Corporate dark background
                tension: 0.4
              }
            ],
          },
          options: {
            layout: { padding: { top: 10, right: 20 } },
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'top',
                align: 'end',
                labels: {
                  color: '#fff',
                  font: { family: 'Inter', size: 12, weight: '600' },
                  usePointStyle: true,
                  boxWidth: 8,
                  boxHeight: 8
                }
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: 'rgba(24, 24, 27, 0.95)',
                titleColor: '#fff',
                titleFont: { family: 'Outfit', size: 14, weight: '700' },
                bodyColor: '#e2e8f0',
                bodyFont: { family: 'Inter', size: 13 },
                borderColor: 'rgba(255, 255, 255, 0.15)',
                borderWidth: 1,
                padding: 12,
                cornerRadius: 8,
                boxPadding: 6,
                usePointStyle: true,
                callbacks: {
                  label: (context) => ` ${context.dataset.label}: UF ${fmt(context.parsed.y, 0)}`
                }
              },
              hoyLine: {
                color: 'var(--accent-rose)', // Make the 'Today' line neon rose
                dash: [4, 4],
                width: 2
              }
            },
            scales: {
              x: {
                grid: {
                  display: true,
                  color: 'rgba(255, 255, 255, 0.03)',
                  drawBorder: false
                },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.6)',
                  font: { family: 'Inter', size: 11 },
                  maxTicksLimit: 12,
                  callback: function (value, index) {
                    const mes = rawData[index].mes;
                    if (mes === 0) return "Inicio";
                    if (mes === +cr.mesesPagados) return "Hoy";
                    if (mes % 12 === 0) return `Año ${mes / 12}`;
                    return null;
                  }
                }
              },
              y: {
                border: { display: false },
                grid: {
                  color: 'rgba(255, 255, 255, 0.05)',
                  drawTicks: false
                },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.6)',
                  font: { family: 'Inter', size: 11 },
                  padding: 10,
                  callback: (v) => `UF ${fmt(v, 0)}`
                }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [evolucionSin, evolucionPlazo, evolucionCuota, mesesRestantes, saldoInicial, cr]);

      return (
        <div style={{ height: 350, padding: "10px 0", position: 'relative' }}>
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // ── GRÁFICO BARRAS CUOTAS (NUEVO) ──────────────────────────────────────────
    const GraficoCuotas = ({ evolucionCuota, cuotaBase, destino, valorUF }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current || !evolucionCuota || evolucionCuota.length === 0) return;

        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = chartRef.current.getContext('2d');
        const labels = evolucionCuota.map(d => `Año ${d.ano}`);

        // Gradient fill for the prepago bars (Corporate Blue)
        const gradCon = ctx.createLinearGradient(0, 0, 0, 400);
        gradCon.addColorStop(0, 'rgba(59, 130, 246, 0.85)');
        gradCon.addColorStop(1, 'rgba(59, 130, 246, 0.1)');

        // Custom plugin: draw horizontal reference line + value labels on bars
        const refLinePlugin = {
          id: 'refLine',
          afterDatasetsDraw(chart) {
            const { ctx: c, chartArea: { left, right, top, bottom }, scales: { y } } = chart;
            if (!cuotaBase || !y) return;

            // --- Horizontal dashed line for "Cuota Original" ---
            const yPos = y.getPixelForValue(cuotaBase);
            c.save();
            c.beginPath();
            c.setLineDash([6, 4]);
            c.strokeStyle = '#f43f5e';
            c.lineWidth = 2;
            c.moveTo(left, yPos);
            c.lineTo(right, yPos);
            c.stroke();
            c.setLineDash([]);

            // Label for the reference line
            c.fillStyle = '#f43f5e';
            c.font = '600 12px Inter';
            c.textAlign = 'right';
            c.fillText(`Cuota fija: UF ${fmt(cuotaBase, 1)}`, right - 4, yPos - 8);
            c.restore();
          }
        };

        chartInstance.current = new window.Chart(ctx, {
          type: 'bar',
          plugins: [refLinePlugin],
          data: {
            labels,
            datasets: [
              {
                label: 'Cuota con Prepago',
                data: evolucionCuota.map(d => d.cuotaCon),
                backgroundColor: gradCon,
                borderColor: '#3b82f6',
                borderWidth: 0,
                borderRadius: 6,
                borderSkipped: false,
                barPercentage: 0.55,
                categoryPercentage: 0.7
              }
            ],
          },
          options: {
            layout: { padding: { top: 30, right: 16, left: 8 } },
            responsive: true,
            maintainAspectRatio: false,
            animation: {
              duration: 800,
              easing: 'easeOutQuart'
            },
            plugins: {
              legend: {
                display: true,
                position: 'top',
                align: 'end',
                labels: {
                  color: '#fff',
                  font: { family: 'Inter', size: 12, weight: '600' },
                  usePointStyle: true,
                  boxWidth: 10,
                  generateLabels: () => [
                    { text: 'Cuota Original (fija)', fillStyle: '#f43f5e', strokeStyle: '#f43f5e', lineWidth: 2, lineDash: [6, 4], pointStyle: 'line', fontColor: '#fff' },
                    { text: 'Cuota con Prepago', fillStyle: 'rgba(59, 130, 246, 0.85)', strokeStyle: '#3b82f6', lineWidth: 0, pointStyle: 'rect', fontColor: '#fff' }
                  ]
                }
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: '#18181b',
                titleColor: '#fff',
                titleFont: { family: 'Outfit', size: 13, weight: '700' },
                bodyColor: '#e2e8f0',
                bodyFont: { family: 'Inter', size: 12 },
                borderColor: 'rgba(255, 255, 255, 0.12)',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 6,
                boxPadding: 4,
                displayColors: false,
                callbacks: {
                  title: (items) => items[0]?.label || '',
                  beforeBody: () => [`Cuota Original: UF ${fmt(cuotaBase, 2)}`],
                  label: (context) => {
                    const val = context.parsed.y;
                    const diff = cuotaBase - val;
                    const pct = ((diff / cuotaBase) * 100).toFixed(1);
                    if (val <= 0) return 'Crédito liquidado';
                    const lines = [`Cuota Proyectada: UF ${fmt(val, 2)}  (↓${pct}%)`];
                    if (valorUF) {
                      lines.push(`Cuota Proyectada: ${Math.round(val * valorUF).toLocaleString('es-CL')} CLP`);
                    }
                    return lines;
                  },
                  afterBody: (items) => {
                    const val = items[0]?.parsed?.y || 0;
                    const diff = cuotaBase - val;
                    return diff > 0 ? [`Ahorro mensual: UF ${fmt(diff, 2)}`] : [];
                  }
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                border: { display: false },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.5)',
                  font: { family: 'Inter', size: 11, weight: '500' },
                  maxRotation: 0
                }
              },
              y: {
                border: { display: false },
                beginAtZero: true,
                suggestedMax: cuotaBase * 1.15,
                grid: { color: 'rgba(255, 255, 255, 0.04)', drawTicks: false },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.5)',
                  font: { family: 'Inter', size: 11 },
                  padding: 10,
                  callback: (v) => `UF ${fmt(v, 0)}`
                }
              }
            },
            interaction: { mode: 'index', axis: 'x', intersect: false }
          }
        });

        return () => {
          if (chartInstance.current) chartInstance.current.destroy();
        };
      }, [evolucionCuota, cuotaBase]);

      return (
        <div style={{ height: "100%", position: "relative" }}>
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // ── ESCENARIO 1 (TASAS E INFLACIÓN) ────────────────────────────────────────────────────────
    const Escenario1 = ({ cr, saldoActual, mesesRestantes, interesesBase, pr, cuotaBase, valorUF, cae, inflacion, setInflacion, retornoInv, setRetornoInv }) => {
      // Evaluar escenario actual
      const minPrepago = Math.ceil(saldoActual * 0.05); // Límite legal 5%
      const montoEstrategico = Math.max(minPrepago, +pr.monto);
      const { totalMultas } = simularPrepago(
        saldoActual, +cr.tna, mesesRestantes, montoEstrategico, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago
      );

      // MODELO B: Arbitraje de Tasas (Criterio de Fisher Modificado)
      const tnaDecimal = cae / 100; // Usamos el CAE como costo real
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;

      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1; // Costo Efectivo Nominal
      const deltaFisher = i_nom - retDecimal; // Diferencial Neto
      const piElegible = ((1 + retDecimal) / (1 + tnaDecimal)) - 1; // Punto de equilibrio inflacionario

      // Decisión Final
      const esDominante = deltaFisher > 0;

      return (
        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          <div className="grid-2" style={{ gap: 16 }}>
            {/* ────── MODELO A: PUNTO DE EQUILIBRIO DE INFLACIÓN ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#fff", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>A.</span> Punto de Equilibrio (π*)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                En Chile, la deuda hipotecaria está en UF y la inversión en pesos (CLP). Este modelo calcula la <strong>inflación exacta</strong> en la que tu crédito se encarece tanto que empata con la rentabilidad de tu inversión.
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.03)", padding: "16px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.05)", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4, textTransform: "uppercase" }}>Break-even (π*)</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#fff" }}>{(piElegible * 100).toFixed(2)}%</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4, textTransform: "uppercase" }}>Tu Proyección (π)</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: inflacion > (piElegible * 100) ? "var(--accent-emerald)" : "var(--accent-rose)" }}>{(+inflacion).toFixed(2)}%</div>
                </div>
              </div>

              {/* Regla de Decisión Dinámica */}
              {(() => {
                const piPct = piElegible * 100;
                const upperBound = piPct + 0.25;
                const lowerBound = piPct - 0.25;
                const inf = +inflacion;
                let bg, color, title, desc;

                if (inf > upperBound) {
                  bg = "rgba(16,185,129,0.1)"; color = "#10b981";
                  title = "🟢 PREPAGO GANA"; desc = "La inflación proyectada es demasiado alta. Tu deuda en UF está creciendo más rápido de lo que rendiría el capital en el banco. Matemática y financieramente, te conviene liquidar la deuda.";
                } else if (inf < lowerBound) {
                  bg = "rgba(244,63,94,0.1)"; color = "#f43f5e";
                  title = "🔴 INVERSIÓN GANA"; desc = "Con una inflación baja, la UF crece lento. El dinero tiene mucha más fuerza multiplicadora rindiendo en tu instrumento financiero que destruyendo pasivos estáticos.";
                } else {
                  bg = "rgba(245,158,11,0.1)"; color = "#f59e0b";
                  title = "🟡 ZONA DE INDIFERENCIA"; desc = `La inflación proyectada está extremadamente cerca del punto de equilibrio [${lowerBound.toFixed(2)}% - ${upperBound.toFixed(2)}%]. En este margen, la rentabilidad es casi idéntica; elige la opción que te dé mayor liquidez o tranquilidad psicológica.`;
                }

                return (
                  <div style={{ background: bg, border: `1px solid ${bg.replace("0.1)", "0.3)")}`, padding: "16px", borderRadius: 8, marginTop: "auto" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: color, marginBottom: 8, letterSpacing: "0.05em" }}>{title}</div>
                    <div style={{ fontSize: 12, color: color, opacity: 0.9, lineHeight: 1.4 }}>{desc}</div>
                  </div>
                );
              })()}
            </div>

            {/* ────── MODELO B: ARBITRAJE Y PARIDAD ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#fff", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>B.</span> Arbitraje y Paridad (Fisher)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                Transforma el costo en UF de tu crédito a una <strong>Tasa Anual Nominal (CLP)</strong> para compararlo directamente (peras con peras) con el retorno de tu inversión bancaria.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: 12, borderRadius: 8, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>Costo Total Efectivo Nominal</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "var(--accent-cyan)" }}>{(i_nom * 100).toFixed(2)}%</div>
                </div>
                <div style={{ background: deltaFisher > 0 ? "rgba(16,185,129,0.1)" : "rgba(244,63,94,0.1)", padding: 12, borderRadius: 8, textAlign: "center", border: `1px solid ${deltaFisher > 0 ? 'rgba(16,185,129,0.3)' : 'rgba(244,63,94,0.3)'}` }}>
                  <div style={{ fontSize: 10, color: deltaFisher > 0 ? "#10b981" : "#f43f5e", marginBottom: 6, textTransform: "uppercase" }}>Spread de Arbitraje Neto</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: deltaFisher > 0 ? "#10b981" : "#f43f5e" }}>
                    {deltaFisher > 0 ? '+' : ''}{(deltaFisher * 100).toFixed(2)}%
                  </div>
                </div>
                <div style={{ background: "rgba(255,255,255,0.03)", padding: 12, borderRadius: 8, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>Retorno Nominal Inversión</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>{(+retornoInv).toFixed(2)}%</div>
                </div>
              </div>
              <div style={{
                background: esDominante ? "rgba(16,185,129,0.1)" : "rgba(244,63,94,0.1)",
                border: `1px solid ${esDominante ? 'rgba(16,185,129,0.3)' : 'rgba(244,63,94,0.3)'}`,
                color: esDominante ? "#10b981" : "#f43f5e",
                padding: "16px", borderRadius: 8, marginTop: "auto"
              }}>
                <div style={{ fontSize: 13, fontWeight: 800, textAlign: "center", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>
                  {esDominante ? '🟢 Costo Crédito > Retorno Inversión' : '🔴 Costo Crédito < Retorno Inversión'}
                </div>
                <div style={{ fontSize: 12, textAlign: "center", opacity: 0.9, lineHeight: 1.4, color: esDominante ? "#10b981" : "#f43f5e" }}>
                  {esDominante
                    ? `Tu crédito te cuesta ${(i_nom * 100).toFixed(2)}% anual nominal, pero tu dinero solo rinde ${(+retornoInv).toFixed(2)}%. Estás perdiendo patrimonio manteniendo dinero invertido en lugar de pagar deuda cara.`
                    : `Cerrar este crédito es ineficiente. El costo financiero en UF sale más barato (${(i_nom * 100).toFixed(2)}% nominal) que lo que el banco te paga por mantener el dinero en fondos (${(+retornoInv).toFixed(2)}%). Acumula capital tranquilo.`}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── ESCENARIO 2 (VALOR PRESENTE & RIESGO ESTOCÁSTICO) ───────────────────────────────────
    const Escenario2 = ({ cr, saldoActual, mesesRestantes, interesesBase, pr, cuotaBase, valorUF, cae, inflacion, setInflacion, retornoInv, setRetornoInv }) => {
      // Evaluar escenario actual
      const minPrepago = Math.ceil(saldoActual * 0.05);
      const montoEstrategico = Math.max(minPrepago, +pr.monto);
      const { mesesReales, totalIntereses, totalMultas } = simularPrepago(
        saldoActual, +cr.tna, mesesRestantes, montoEstrategico, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago
      );

      const mesesAhorrados = Math.max(0, mesesRestantes - mesesReales);
      const ahorroIntereses = interesesBase - totalIntereses;
      const ahorroSeguros = mesesAhorrados * (+cr.seguros || 0);
      const ahorroBruto = ahorroIntereses + ahorroSeguros;
      const ahorroNeto = ahorroBruto - totalMultas;

      // Variables Macro para Monte Carlo
      const tnaDecimal = cae / 100;
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;
      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1;
      const deltaFisher = i_nom - retDecimal;

      // MODELO C: Valor Presente Neto (VPN)
      const rhoMensual = tasaMensual(retornoInv);
      const flujoMensual = cuotaBase + (+cr.seguros || 0);
      const calcPV = (flujo, n, r) => r === 0 ? flujo * n : flujo * (1 - Math.pow(1 + r, -n)) / r;

      const vpContrato = calcPV(flujoMensual, mesesRestantes, rhoMensual);
      const vpPrepago = montoEstrategico + totalMultas + calcPV(flujoMensual, mesesReales, rhoMensual);
      const ahorroVPN = vpContrato - vpPrepago;
      const convieneVPN = ahorroVPN > 0;

      // MODELO D: Simulación Estocástica Simplificada (Monte Carlo)
      const zScore = deltaFisher / Math.sqrt(0.015 ** 2 + 0.02 ** 2);
      let probConveniencia = 1 / (1 + Math.exp(-1.702 * zScore));
      if (deltaFisher < -0.02) probConveniencia = 0.05 + Math.random() * 0.1;
      if (deltaFisher > 0.05) probConveniencia = 0.90 + Math.random() * 0.05;

      const volatilidadAhorro = ahorroNeto * 0.35;
      const mcRango = [Math.max(0, ahorroNeto - volatilidadAhorro), ahorroNeto + volatilidadAhorro];

      return (
        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          <div className="grid-2" style={{ gap: 16 }}>
            {/* ────── MODELO C: VALOR PRESENTE NETO ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#fff", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>C.</span> Valor Presente Neto (VPN)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                El dinero en el futuro vale menos que hoy. Este modelo <strong>descuenta todos los flujos de tus dividendos futuros</strong> de vuelta al día de hoy, usando tu rentabilidad de inversión como barrera de descuento.
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: "8px 8px 0 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                <div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", textTransform: "uppercase" }}>VP Contrato Base</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>Sin prepagar nada</div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff", alignSelf: "center" }}>UF {fmt(vpContrato)}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20, background: "rgba(255,255,255,0.03)", padding: "12px", borderRadius: "0 0 8px 8px" }}>
                <div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", textTransform: "uppercase" }}>VP Estrategia (+ Prepago)</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>Inyección + Nuevos flujos</div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff", alignSelf: "center" }}>UF {fmt(vpPrepago)}</div>
              </div>

              <div style={{
                background: convieneVPN ? "rgba(16,185,129,0.1)" : "rgba(244,63,94,0.1)",
                border: `1px solid ${convieneVPN ? 'rgba(16,185,129,0.3)' : 'rgba(244,63,94,0.3)'}`,
                padding: "16px", borderRadius: 8, marginTop: "auto"
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: convieneVPN ? "#10b981" : "#f43f5e", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                    Creación Neta de Patrimonio
                  </span>
                  <span style={{ fontSize: 24, fontWeight: 800, color: convieneVPN ? "#10b981" : "#f43f5e" }}>
                    {convieneVPN ? "+" : ""}UF {fmt(ahorroVPN)}
                  </span>
                </div>
                <div style={{ fontSize: 12, color: convieneVPN ? "#10b981" : "#f43f5e", opacity: 0.9, lineHeight: 1.4 }}>
                  {convieneVPN
                    ? `Al ejecutar esta estrategia, estás "destruyendo obligaciones" y agregando directamente riqueza presente y pura a tu hoja de balance personal.`
                    : `Destinar capital hoy para comprar deuda barata está "destruyendo" valor presente en tu patrimonio neto en favor del banco.`}
                </div>
              </div>
            </div>

            {/* ────── MODELO D: MONTE CARLO ────── */}
            <div className="glass-card" style={{ padding: "16px", background: "linear-gradient(135deg, rgba(24,24,27,1) 0%, rgba(245,158,11,0.05) 100%)", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#fff", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-amber)" }}>D.</span> Monte Carlo (Probabilidades)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 20, lineHeight: 1.5 }}>
                Las inversiones rara vez tienen un retorno fijo asegurado. Este modelo somete tu retorno del {retornoInv}% a un entorno de <strong>caos y volatilidad estocástica</strong> para medir la verdadera probabilidad de vencer al banco en el mundo real.
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24, background: "rgba(0,0,0,0.2)", padding: "16px", borderRadius: 8, flexWrap: "wrap" }}>
                <div style={{ fontSize: 42, fontWeight: 800, color: "var(--accent-amber)", lineHeight: 1 }}>{(probConveniencia * 100).toFixed(1)}%</div>
                <div style={{ fontSize: 12, color: "var(--text-muted)", lineHeight: 1.4 }}>
                  <strong>Probabilidad de Éxito.</strong><br />
                  Si corremos esta estrategia 10,000 veces en la economía, esta es la cantidad de veces que el pago del crédito es superior a tu inversión base.
                </div>
              </div>

              <div style={{ background: "rgba(255,255,255,0.03)", padding: "16px", borderRadius: 8, marginTop: "auto" }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10, textTransform: "uppercase", fontWeight: 600 }}>Espectro de Ahorro Neto UF (P10 - P90)</div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>UF {fmt(mcRango[0], 0)}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>Peor Escenario</div>
                  </div>
                  <div style={{ flex: 1, position: "relative" }}>
                    <div style={{ height: 6, background: "rgba(0,0,0,0.4)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ width: "100%", height: "100%", background: "linear-gradient(90deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.8), rgba(245, 158, 11, 0.2))", borderRadius: 3, opacity: 0.8 }}></div>
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>UF {fmt(mcRango[1], 0)}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>Mejor Escenario</div>
                  </div>
                </div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 12, textAlign: "center", fontStyle: "italic" }}>
                  Bajo un estrés de mercado del 35% de desviación estándar.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── GRÁFICO ESCENARIOS (MULTI-LÍNEA) ─────────────────────────────────────────
    const GraficoEscenarios = ({ saldoActual, cr, mesesRestantes, pr, cuotaBase }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        const minPrepago = Math.ceil(saldoActual * 0.05);

        // Generate the same 4 strategic amounts used in Escenarios
        const findOptimalAmount = () => {
          let bestRoi = -Infinity, bestAmount = minPrepago;
          const interesesBase = calcularInteresesTotales(saldoActual, +cr.tna, mesesRestantes);
          for (let m = minPrepago; m <= Math.min(saldoActual * 0.5, 2000); m += 10) {
            const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago);
            const roi = s.totalPrepagado > 0 ? ((interesesBase - s.totalIntereses - s.totalMultas) / s.totalPrepagado) * 100 : 0;
            if (roi > bestRoi) { bestRoi = roi; bestAmount = m; }
          }
          const lo = Math.max(minPrepago, bestAmount - 15), hi = Math.min(saldoActual, bestAmount + 15);
          for (let m = lo; m <= hi; m++) {
            const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago);
            const roi = s.totalPrepagado > 0 ? ((interesesBase - s.totalIntereses - s.totalMultas) / s.totalPrepagado) * 100 : 0;
            if (roi > bestRoi) { bestRoi = roi; bestAmount = m; }
          }
          return bestAmount;
        };
        const montoOptimo = findOptimalAmount();
        const candidates = new Set([minPrepago, montoOptimo]);
        const medio = Math.round(Math.max(montoOptimo * 1.5, minPrepago * 3));
        if (medio < saldoActual && medio !== montoOptimo) candidates.add(medio);
        const agresivo = Math.round(Math.max(montoOptimo * 3, minPrepago * 6));
        if (agresivo < saldoActual && agresivo !== montoOptimo && agresivo !== medio) candidates.add(agresivo);
        [minPrepago * 2, montoOptimo * 2].map(Math.round).forEach(e => {
          if (candidates.size < 4 && e > minPrepago && e < saldoActual && !candidates.has(e)) candidates.add(e);
        });
        const montos = [...candidates].sort((a, b) => a - b).slice(0, 4);

        // Colors for the 4 curves
        const curveColors = ['#f59e0b', '#10b981', '#06b6d4', '#8b5cf6'];

        // Generate datasets: baseline + 4 scenarios
        // Baseline: sin prepago
        const baseSim = simularPrepago(saldoActual, +cr.tna, mesesRestantes, 0, pr.frecuencia, 0, pr.destino, cuotaBase, +cr.costoPrepago);
        const basePoints = baseSim.evolucionSin.filter((_, i) => i % 6 === 0 || i === baseSim.evolucionSin.length - 1)
          .map(p => ({ x: p.mes, y: p.saldo }));

        const datasets = [{
          label: 'Sin Prepago',
          data: basePoints,
          borderColor: '#64748b',
          borderWidth: 2,
          borderDash: [6, 4],
          pointRadius: 0,
          tension: 0.3,
          fill: false
        }];

        montos.forEach((m, i) => {
          const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago);
          const points = s.evolucionCon.filter((_, j) => j % 6 === 0 || j === s.evolucionCon.length - 1)
            .map(p => ({ x: p.mes, y: p.saldo }));
          datasets.push({
            label: `UF ${m}${m === montoOptimo ? ' (Óptimo)' : ''}`,
            data: points,
            borderColor: curveColors[i],
            borderWidth: m === montoOptimo ? 3 : 2,
            pointRadius: 0,
            tension: 0.3,
            fill: false
          });
        });

        chartInstance.current = new window.Chart(ctx, {
          type: 'line',
          data: { datasets },
          options: {
            layout: { padding: { top: 10, right: 16, left: 8 } },
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 600, easing: 'easeOutQuart' },
            plugins: {
              legend: {
                position: 'top', align: 'end',
                labels: {
                  color: '#fff',
                  font: { family: 'Inter', size: 11, weight: '600' },
                  usePointStyle: true, boxWidth: 8, padding: 16
                }
              },
              tooltip: {
                mode: 'nearest',
                intersect: false,
                backgroundColor: '#18181b',
                titleColor: '#fff',
                titleFont: { family: 'Outfit', size: 13, weight: '700' },
                bodyColor: '#e2e8f0',
                bodyFont: { family: 'Inter', size: 12 },
                borderColor: 'rgba(255, 255, 255, 0.12)',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 6,
                displayColors: true,
                callbacks: {
                  title: (items) => `Mes ${items[0]?.parsed?.x || 0}`,
                  label: (ctx) => ` ${ctx.dataset.label}: UF ${fmt(ctx.parsed.y, 0)}`
                }
              }
            },
            scales: {
              x: {
                type: 'linear',
                title: { display: true, text: 'Meses', color: 'rgba(255,255,255,0.4)', font: { family: 'Inter', size: 11 } },
                grid: { display: false },
                border: { display: false },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.5)',
                  font: { family: 'Inter', size: 11 },
                  maxRotation: 0,
                  callback: (v) => {
                    const a = Math.floor(v / 12);
                    return a > 0 ? `Año ${a}` : `${v}m`;
                  }
                }
              },
              y: {
                border: { display: false },
                beginAtZero: true,
                grid: { color: 'rgba(255, 255, 255, 0.04)', drawTicks: false },
                ticks: {
                  color: 'rgba(255, 255, 255, 0.5)',
                  font: { family: 'Inter', size: 11 },
                  padding: 10,
                  callback: (v) => `UF ${fmt(v, 0)}`
                }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [saldoActual, cr, mesesRestantes, pr, cuotaBase]);

      return (
        <div style={{ height: "100%", position: "relative" }}>
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // ── REPORTE PDF (Oculto en DOM) ──────────────────────────────────────────────
    const ReportePDF = React.forwardRef(({ cr, pr, sim, saldoActual, mesesRestantes, cuotaBase, interesesBase, ahorroNeto, mesesAhorrados, inflacion, retornoInv, simularPrepago }, ref) => {
      // Formateadores locales para PDF
      const fNum = (num) => (+num).toLocaleString('es-CL', { maximumFractionDigits: 1 });
      const fMon = (num) => `UF ${fNum(num)}`;
      const fmtM = (m) => `${Math.floor(m / 12)}a ${m % 12}m`;

      // Wrapper para simular escenarios
      const runSim = (monto) => {
        const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, monto, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago);
        const ahorroInt = interesesBase - s.totalIntereses;
        return {
          ...s,
          ahorroNeto: ahorroInt - s.totalMultas,
          ahorroIntereses: ahorroInt,
          mesesAhorrados: mesesRestantes - s.mesesReales,
          nuevaCuota: s.nuevaCuota
        };
      };

      // Métricas Avanzadas (Fisher & VPN)
      const tnaDecimal = (+cr.cae || +cr.tna) / 100;
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;
      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1; // Costo Nominal
      const deltaFisher = i_nom - retDecimal;

      const rhoMensual = tasaMensual(retornoInv);
      const vpContrato = cuotaBase * (1 - Math.pow(1 + rhoMensual, -mesesRestantes)) / rhoMensual;
      const vpPrepago = pr.monto + sim.totalMultas + (sim.nuevaCuota * (1 - Math.pow(1 + rhoMensual, -sim.mesesReales)) / rhoMensual);
      const ahorroVPN = vpContrato - vpPrepago;

      // Escenarios comparativos (Page 3)
      const nivelesPrepago = [50, 100, 200, 300, 500, 800];
      const maxAhorro = Math.max(0, ...nivelesPrepago.map(m => runSim(m).ahorroNeto));

      // ── SVG Math Helpers (Page 4)
      const maxMes = mesesRestantes || 1;
      const maxSaldo = saldoActual || 1;
      const mapX = (mes) => 60 + (mes / maxMes) * 570;
      const mapY = (saldo) => 245 - (saldo / maxSaldo) * 215;

        { id: "datos", label: "Datos de Entrada", icon: "⚙️" },
        { id: "resumen", label: "Dashboard Resumen", icon: "📊" },
        { id: "grafico", label: "Gráfico Comparativo", icon: "📈" },
        { id: "escenario1", label: "Arbitraje de Tasas", icon: "⚡" },
        { id: "escenario2", label: "Valoración & Riesgo", icon: "🎯" },
        { id: "comparacion", label: "Evolución de Cuota", icon: "💰" }
      ];

      if (showPrintView) {
        return (
          <div>
            <button className="no-print" onClick={() => setShowPrintView(false)} style={{ margin: 12, padding: 8 }}>&larr; Volver</button>
            <div className="pdf-report-container">
              <ReportePDF
                cr={cr}
                pr={pr}
                sim={sim}
                saldoActual={saldoActual}
                mesesRestantes={mesesRestantes}
                cuotaBase={cuotaBase}
                interesesBase={interesesBase}
                ahorroNeto={ahorroNeto}
                mesesAhorrados={mesesAhorrados}
                inflacion={inflacion}
                retornoInv={retornoInv}
                simularPrepago={simularPrepago}
                valorUF={valorUF}
              />
            </div>
          </div>
        );
      }

      return (
        <>
          <div className="app-container">
            <div className="sidebar">
              <div className="sidebar-header">
                <h1 className="sidebar-title text-gradient">SIMULADOR HIPOTECARIO</h1>
                <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 6, fontWeight: 500, marginBottom: 16 }}>
                  Análisis de Prepago Inteligente
                </div>
              </div>

              <div className="sidebar-inputs" style={{ display: "none" }}>
              </div>

              <div className="sidebar-nav">
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, paddingLeft: 12 }}>
                  Vistas de Análisis
                </div>
                {tabs.map((t) => (
                  <button key={t.id}
                    onClick={() => setTab(t.id)}
                    className={`sidebar-tab ${tab === t.id ? 'active' : ''}`}
                  >
                    <span className="sidebar-tab-icon">{t.icon}</span>
                    <span style={{ flex: 1 }}>{t.label}</span>
                  </button>
                ))}
              </div>

              <div className="sidebar-footer">
                <button
                  onClick={() => setShowPrintView(true)}
                  style={{
                    width: "100%",
                    padding: "14px",
                    borderRadius: "10px",
                    background: "rgba(99, 102, 241, 0.1)",
                    color: "var(--accent-indigo)",
                    border: "1px solid rgba(99, 102, 241, 0.2)",
                    fontWeight: 700,
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: "8px",
                    transition: "all 0.2s"
                  }}
                  onMouseOver={(e) => {
                    e.currentTarget.style.background = "var(--accent-indigo)";
                    e.currentTarget.style.color = "#fff";
                  }}
                  onMouseOut={(e) => {
                    e.currentTarget.style.background = "rgba(99, 102, 241, 0.1)";
                    e.currentTarget.style.color = "var(--accent-indigo)";
                  }}
                >
                  <span style={{ fontSize: 16 }}>📄</span> Exportar Reporte
                </button>
              </div>
            </div>

            {/* ── ÁREA PRINCIPAL (DERECHA) ── */}
            <div className="main-area">
              <div className="main-content-scroll">

                {/* Banner Alerta */}
                {+pr.monto > 0 && (
                  <div className={`alert-box ${conviene ? 'alert-success' : 'alert-warning'}`} style={{ flexShrink: 0, marginBottom: 16 }}>
                    <div className="alert-icon">{conviene ? "🚀" : "⚠️"}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap", flex: 1 }}>
                      <div className="alert-title" style={{ marginBottom: 0 }}>
                        {conviene ? "Estrategia Rentable" : "El costo de prepago supera el ahorro"}
                      </div>
                      <div className="alert-desc">
                        {conviene
                          ? `Estás ahorrando UF ${fmt(ahorroNeto)} netos (descontado el costo de prepago de UF ${fmt(sim.totalMultas)}).`
                          : `Tu ahorro en interés no alcanza a cubrir el costo de prepago de UF ${fmt(sim.totalMultas)}.`}
                      </div>
                    </div>
                  </div>
                )}

                {/* Visores Dinámicos */}
                <div className="glass-card" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 0 }}>
                  <div style={{ padding: "8px 12px", overflowY: "auto" }}>
                    {tab === "datos" && (
                      <div className="animate-fade grid-2" style={{ gap: 16 }}>
                        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                          <div className="glass-card" style={{ padding: 16, height: "100%", display: "flex", flexDirection: "column" }}>
                            <div className="section-title">
                              <span style={{ fontSize: 18 }}>🏦</span> Datos del Crédito
                            </div>
                            <div className="grid-2" style={{ flex: 1, alignContent: "start", rowGap: 16 }}>
                              <Input label="Monto original" value={cr.capital} onChange={setC("capital")} prefix="UF" min={1} />
                              <Input label="Tasa (TNA)" value={cr.tna} onChange={setC("tna")} suffix="%" step={0.1} />
                              <Input label="Plazo total" value={cr.plazo} onChange={setC("plazo")} suffix="meses" />
                              <Input label="Meses pagados" value={cr.mesesPagados} onChange={setC("mesesPagados")} suffix="meses" />
                              <Input label="CAE" value={cr.cae} onChange={setC("cae")} suffix="%" step={0.01} />
                              <div style={{ gridColumn: "1/-1" }}>
                                <Select label="Costo Prepago" value={cr.costoPrepago} onChange={setC("costoPrepago")}
                                  options={costosPrepagoOpciones} />
                              </div>
                            </div>
                          </div>
                        </div>

                        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

                          <div className="glass-card" style={{ height: "fit-content", borderColor: "rgba(245, 158, 11, 0.2)", padding: 16 }}>
                            <div className="section-title" style={{ color: "var(--accent-amber)" }}>
                              <span style={{ fontSize: 18 }}>💸</span> Tu Estrategia
                            </div>
                            <div className="grid-2">
                              <Input label="Monto Prepago" value={pr.monto} onChange={setP("monto")} prefix="UF" />
                              <Select label="Frecuencia" value={pr.frecuencia} onChange={setP("frecuencia")}
                                options={[{ value: "semestral", label: "Semestral" }, { value: "anual", label: "Anual" }]} />
                              <Input label="Inicia en mes" value={pr.mesInicio} onChange={setP("mesInicio")} suffix="meses" />
                              <div style={{ gridColumn: "1/-1" }}>
                                <Select label="Destino" value={pr.destino} onChange={setP("destino")}
                                  options={[{ value: "plazo", label: "Bajar Plazo" }, { value: "cuota", label: "Bajar Cuota" }]} />
                              </div>
                            </div>
                          </div>

                          <div className="glass-card" style={{ borderColor: "rgba(168, 85, 247, 0.2)", padding: 16 }}>
                            <div className="section-title" style={{ color: "var(--accent-indigo)" }}>
                              <span style={{ fontSize: 18 }}>⚙️</span> Macroeconómicos
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                              <Input label="Inflación Proyectada (π)" value={inflacion} onChange={v => setInflacion(v)} suffix="%" step={0.1} />
                              <Input label="Retorno Inversión (ρ)" value={retornoInv} onChange={v => setRetornoInv(v)} suffix="%" step={0.1} />
                            </div>
                            <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 12, lineHeight: 1.4 }}>
                              *Variables usadas estocásticamente en los modelos de Arbitraje y VPN.
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    {tab === "resumen" && (
                      <div className="animate-fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        <div>
                          <h3 style={{ fontSize: 16, marginBottom: 16, color: "#fff", display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent-indigo)" }}></div>
                            Si no prepagas (Tu estado actual)
                          </h3>
                          <div className="grid-3">
                            <Stat label="Saldo Actual" value={`UF ${fmt(saldoActual)}`} colorClass="indigo" />
                            <Stat label="Saldo Actual CLP" value={valorUF ? fmtCLP(saldoActual * valorUF) : "Cargando..."} sub={valorUF ? `UF 1 = ${fmtCLP(valorUF)}` : ""} colorClass="indigo" />
                            <Stat label="Intereses Restantes" value={`UF ${fmt(interesesBase)}`} colorClass="indigo" />
                            <Stat label="Cuota Mensual" value={`UF ${fmt(cuotaBase)}`} colorClass="indigo" />
                            <Stat label="Cuota Mensual CLP" value={valorUF ? fmtCLP(cuotaBase * valorUF) : "Cargando..."} sub={valorUF ? `UF 1 = ${fmtCLP(valorUF)}` : ""} colorClass="indigo" />
                            <Stat label="Tiempo Restante" value={fmtM(mesesRestantes)} sub={`(${mesesRestantes} meses)`} colorClass="indigo" />
                          </div>
                        </div>

                        <div style={{ height: 1, background: "var(--card-border)", width: "100%" }} />

                        {+pr.monto > 0 && (
                          <div>
                            <h3 style={{ fontSize: 16, marginBottom: 16, color: "#fff", display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent-emerald)" }}></div>
                              Aplicando tu estrategia
                            </h3>
                            <div className="grid-3">
                              <Stat label="Ahorro NETO Total" value={`UF ${fmt(ahorroNeto)}`} sub="Descontando multas" colorClass={ahorroNeto > 0 ? "emerald" : "rose"} big />
                              {pr.destino === "plazo" ? (
                                <React.Fragment>
                                  <Stat label="Nuevo Plazo" value={fmtM(sim.mesesReales)} sub={`Original: ${fmtM(mesesRestantes)}`} colorClass="cyan" big />
                                  <Stat label="Tiempo Ahorrado" value={fmtM(mesesAhorrados)} colorClass="emerald" big />
                                </React.Fragment>
                              ) : (
                                <Stat label="Nueva Cuota" value={`UF ${fmt(sim.nuevaCuota)}`} sub={`Te ahorras UF ${fmt(cuotaBase - sim.nuevaCuota)} / mes`} colorClass="cyan" big />
                              )}
                              <Stat label="Interés Ahorrado" value={`UF ${fmt(ahorroIntereses)}`} colorClass="emerald" />
                              <Stat label="Total Prepagado" value={`UF ${fmt(sim.totalPrepagado)}`} sub={`En ${sim.prepagosRealizados} eventos`} colorClass="amber" />
                            </div >
                          </div >
                        )}
                      </div >
                    )}

                    {
                      tab === "grafico" && (
                        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", height: "100%", gap: 20 }}>
                          {+pr.monto > 0 && ahorroIntereses > 0 && (
                            <div className="glass-card" style={{ padding: "16px 20px", borderLeft: "4px solid var(--accent-cyan)", borderRadius: "8px 16px 16px 8px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent-cyan)" }}></div>
                                <div style={{ color: "var(--accent-cyan)", fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Executive Summary</div>
                              </div>
                              <div style={{ fontSize: 14, color: "var(--text-main)", lineHeight: 1.6, fontFamily: "var(--font-body)", fontWeight: 400 }}>
                                La estrategia de amortización propuesta acelera la reducción del saldo insoluto, mitigando la exposición a intereses prospectivos en un <strong style={{ color: "#fff", fontWeight: 700 }}>{((ahorroIntereses / interesesBase) * 100).toFixed(1)}%</strong>. Esto permite comparar el impacto diferencial entre reducir plazo y reducir cuota.
                              </div>
                            </div>
                          )}
                          <div className="glass-card" style={{ flex: 1, minHeight: 400, display: "flex", flexDirection: "column" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                              <h3 style={{ fontSize: 15, color: "var(--text-main)", fontWeight: 700, letterSpacing: "-0.01em", display: "flex", alignItems: "center", gap: 8 }}>
                                <span style={{ fontSize: 18 }}>📉</span> Proyección de Saldo Insoluto (UF)
                              </h3>
                            </div>
                            <div style={{ position: "relative", flex: 1, minHeight: 300 }}>
                              <GraficoSaldo evolucionSin={sim.evolucionSin} evolucionPlazo={simPlazo.evolucionCon} evolucionCuota={simCuota.evolucionCon} mesesRestantes={mesesRestantes} saldoInicial={saldoActual} cr={cr} />
                            </div>
                          </div>
                        </div>
                      )
                    }

                    {
                      tab === "escenario1" && (
                        <div className="animate-fade">
                          <h3 style={{ fontSize: 16, marginBottom: 8, color: "#fff", fontWeight: 600 }}>Punto de Equilibrio & Arbitraje</h3>
                          <p style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 16 }}>Análisis de tasas de interés, inflación y costo de capital.</p>
                          <Escenario1 cr={cr} saldoActual={saldoActual} mesesRestantes={mesesRestantes} interesesBase={interesesBase} pr={pr} cuotaBase={cuotaBase} valorUF={valorUF} cae={cae} inflacion={inflacion} setInflacion={setInflacion} retornoInv={retornoInv} setRetornoInv={setRetornoInv} />
                        </div>
                      )
                    }

                    {
                      tab === "escenario2" && (
                        <div className="animate-fade">
                          <h3 style={{ fontSize: 16, marginBottom: 8, color: "#fff", fontWeight: 600 }}>Valor Presente & Riesgo Estocástico</h3>
                          <p style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 16 }}>Análisis de flujos descontados y simulación de volatilidad (Monte Carlo).</p>
                          <Escenario2 cr={cr} saldoActual={saldoActual} mesesRestantes={mesesRestantes} interesesBase={interesesBase} pr={pr} cuotaBase={cuotaBase} valorUF={valorUF} cae={cae} inflacion={inflacion} setInflacion={setInflacion} retornoInv={retornoInv} setRetornoInv={setRetornoInv} />
                        </div>
                      )
                    }

                    {
                      tab === "comparacion" && (
                        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", height: "100%" }}>
                          <h3 style={{ fontSize: 16, marginBottom: 8, color: "#fff", fontWeight: 600 }}>Evolución del Flujo de Caja</h3>
                          <p style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 24 }}>Compara cómo la cuota mensual disminuye progresivamente en el tiempo según tu estrategia.</p>
                          <div style={{ position: "relative", flex: 1, minHeight: 400 }}>
                            <GraficoCuotas evolucionCuota={sim.evolucionCuota} cuotaBase={cuotaBase} destino={pr.destino} valorUF={valorUF} />
                          </div>
                        </div>
                      )
                    }
                  </div >
                </div >
              </div >
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>

</html>
