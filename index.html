<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMULADOR DE PREPAGO HIPOTECARIO</title>

  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Chart.js y react-chartjs-2 (Más estable para uso directo sin Node.js) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-chartjs-2@5.2.0/dist/index.umd.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- CSS Premium -->
  <link rel="stylesheet" href="App.css">

  <!-- Lógica Financiera Centralizada -->
  <script src="financial_logic.js"></script>

  <!-- (pdf libraries removed: using browser print instead) -->

  <!-- ══════════════════════════════════════════════════════════════
       PDF REPORT STYLES — McKinsey Corporate Executive
       ═══════════════════════════════════════════════════════════ -->
  <style>
    /* ── PDF Design Tokens ─────────────────────────────────────── */
    :root {
      --pdf-navy:    #002060;
      --pdf-blue:    #1F4E79;
      --pdf-blue2:   #1D4ED8;
      --pdf-green:   #107C41;
      --pdf-red:     #C00000;
      --pdf-amber:   #D97706;
      --pdf-text:    #0F172A;
      --pdf-muted:   #475569;
      --pdf-lighter: #94A3B8;
      --pdf-border:  #CBD5E1;
      --pdf-bg-light:#F8FAFC;
      --pdf-bg-alt:  #F1F5F9;
    }

    /* ── Viewport wrapper (screen preview) ────────────────────── */
    .pdf-report-container {
      background: #D4D8E0;
      padding: 32px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      color: var(--pdf-text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page base ─────────────────────────────────────────────── */
    .page {
      background: #FFFFFF;
      width: 210mm;
      min-height: 297mm;
      max-width: 210mm;
      margin: 0 auto 28px;
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      page-break-after: always;
      break-after: page;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════════════════
       PORTADA
       ═══════════════════════════════════════════════════════════ */
    .cover-top-bar {
      height: 10px;
      background: var(--pdf-navy);
      width: 100%;
      flex-shrink: 0;
    }
    .cover-body {
      flex: 1;
      padding: 56px 56px 32px;
      display: flex;
      flex-direction: column;
    }
    .cover-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pdf-lighter);
      margin-bottom: 28px;
    }
    .cover-title {
      font-size: 44px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--pdf-navy);
      letter-spacing: -0.025em;
      margin-bottom: 20px;
    }
    .cover-title span { color: var(--pdf-blue2); }

    .cover-subtitle {
      font-size: 13px;
      color: var(--pdf-muted);
      line-height: 1.75;
      max-width: 490px;
      margin-bottom: 36px;
      font-weight: 400;
    }
    .cover-divider {
      height: 2px;
      background: linear-gradient(90deg, var(--pdf-navy) 0%, var(--pdf-blue2) 40%, transparent 100%);
      margin-bottom: 36px;
    }
    .cover-hero-stat {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }
    .cover-stat-box {
      flex: 1;
      padding: 22px 20px;
      border: 1px solid var(--pdf-border);
      border-top: 4px solid var(--pdf-navy);
      background: var(--pdf-bg-light);
    }
    .cover-stat-box.green { border-top-color: var(--pdf-green); }
    .cover-stat-box label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--pdf-lighter);
      margin-bottom: 10px;
    }
    .cover-stat-box .val {
      font-size: 28px;
      font-weight: 800;
      color: var(--pdf-navy);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .cover-stat-box.green .val { color: var(--pdf-green); }
    .cover-stat-box .sub {
      font-size: 10px;
      color: var(--pdf-lighter);
    }
    .cover-meta {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--pdf-border);
      padding-top: 24px;
      margin-top: auto;
    }
    .cover-meta-item {
      flex: 1;
      padding-right: 20px;
      border-right: 1px solid var(--pdf-border);
      margin-right: 20px;
    }
    .cover-meta-item:last-child { border-right: none; margin-right: 0; }
    .cover-meta-item label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pdf-lighter);
      margin-bottom: 5px;
    }
    .cover-meta-item span {
      font-size: 12px;
      font-weight: 600;
      color: var(--pdf-text);
    }
    .cover-footer {
      background: var(--pdf-navy);
      padding: 15px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .cover-footer-brand {
      font-size: 11px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .cover-footer-conf {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
    }

    /* ══════════════════════════════════════════════════════════════
       INNER PAGES
       ═══════════════════════════════════════════════════════════ */
    .inner-page {
      padding: 40px 48px 72px;
    }

    /* ── Page Header ─────────────────────────────────────────────  */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 14px;
      border-bottom: 2.5px solid var(--pdf-navy);
      margin-bottom: 22px;
    }
    .page-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pdf-lighter);
      margin-bottom: 4px;
    }
    .page-title {
      font-size: 21px;
      font-weight: 800;
      color: var(--pdf-navy);
      letter-spacing: -0.015em;
    }
    .page-number {
      font-size: 10px;
      font-weight: 500;
      color: var(--pdf-lighter);
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .page-number strong {
      font-size: 24px;
      font-weight: 800;
      color: var(--pdf-navy);
      line-height: 1;
    }

    /* ── Section Title ───────────────────────────────────────────  */
    .inner-page .section-title {
      font-size: 9px !important;
      font-weight: 700 !important;
      letter-spacing: 0.18em !important;
      text-transform: uppercase !important;
      color: var(--pdf-blue) !important;
      border-bottom: 1px solid var(--pdf-border) !important;
      padding-bottom: 6px !important;
      margin: 18px 0 12px !important;
      background: none !important;
      -webkit-text-fill-color: unset !important;
      -webkit-background-clip: unset !important;
      background-clip: unset !important;
      display: block !important;
    }

    /* ── Page Footer ─────────────────────────────────────────────  */
    .page-footer {
      position: absolute;
      bottom: 24px;
      left: 48px;
      right: 48px;
      padding-top: 10px;
      border-top: 1px solid var(--pdf-border);
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--pdf-lighter);
    }

    /* ══════════════════════════════════════════════════════════════
       KPI BOXES
       ═══════════════════════════════════════════════════════════ */
    .kpi-grid   { display: grid; gap: 8px; margin-bottom: 10px; }
    .kpi-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .kpi-grid-3 { grid-template-columns: repeat(3, 1fr); }

    .kpi-box {
      padding: 14px 16px;
      background: var(--pdf-bg-light);
      border: 1px solid var(--pdf-border);
      border-top: 3px solid var(--pdf-border);
    }
    .kpi-box.navy  { border-top-color: var(--pdf-navy);  background: #EEF2F7; }
    .kpi-box.red   { border-top-color: var(--pdf-red);   background: #FEF2F2; }
    .kpi-box.green { border-top-color: var(--pdf-green); background: #F0FDF4; }

    .kpi-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--pdf-muted);
      margin-bottom: 6px;
    }
    .kpi-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--pdf-navy);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .kpi-box.navy  .kpi-value { color: var(--pdf-navy);  }
    .kpi-box.red   .kpi-value { color: var(--pdf-red);   }
    .kpi-box.green .kpi-value { color: var(--pdf-green); }
    .kpi-sub { font-size: 9px; color: var(--pdf-lighter); }

    /* ══════════════════════════════════════════════════════════════
       CALLOUT BOXES
       ═══════════════════════════════════════════════════════════ */
    .callout {
      background: #F0F4FF;
      border-left: 4px solid var(--pdf-blue2);
      padding: 13px 18px;
      font-size: 11.5px;
      line-height: 1.65;
      color: var(--pdf-text);
      margin-bottom: 16px;
    }
    .callout.green { background: #F0FDF4; border-left-color: var(--pdf-green); }
    .callout.red   { background: #FEF2F2; border-left-color: var(--pdf-red);   }

    /* ══════════════════════════════════════════════════════════════
       INSIGHT BOXES (3-col)
       ═══════════════════════════════════════════════════════════ */
    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .insight-box {
      background: var(--pdf-bg-light);
      border: 1px solid var(--pdf-border);
      border-top: 2px solid var(--pdf-blue2);
      padding: 14px 14px 14px;
      position: relative;
      margin-top: 10px;
    }
    .insight-box::before {
      content: attr(data-n);
      position: absolute;
      top: -11px;
      left: 12px;
      background: var(--pdf-blue2);
      color: white;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 8px;
      letter-spacing: 0.05em;
    }
    .insight-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--pdf-navy);
      margin-bottom: 7px;
      margin-top: 4px;
    }
    .insight-body {
      font-size: 10.5px;
      color: var(--pdf-muted);
      line-height: 1.65;
    }

    /* ══════════════════════════════════════════════════════════════
       DATA TABLES — McKinsey Style
       ═══════════════════════════════════════════════════════════ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
    }
    .data-table thead tr { background: var(--pdf-navy); }
    .data-table thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #FFFFFF;
      border: none;
    }
    .data-table tbody tr { border-bottom: 1px solid var(--pdf-border); }
    .data-table tbody tr:nth-child(even) { background: var(--pdf-bg-alt); }
    .data-table tbody td {
      padding: 9px 12px;
      color: var(--pdf-text);
      font-size: 11px;
      vertical-align: middle;
    }
    .data-table tbody tr.highlight-row {
      background: rgba(29, 78, 216, 0.06);
      border-left: 3px solid var(--pdf-blue2);
      font-weight: 600;
    }
    .tag-blue   { color: var(--pdf-blue2); font-weight: 700; }
    .tag-green  { color: var(--pdf-green); font-weight: 700; }
    .tag-red    { color: var(--pdf-red);   font-weight: 700; }

    /* ══════════════════════════════════════════════════════════════
       BAR CHART ROWS (Escenarios)
       ═══════════════════════════════════════════════════════════ */
    .bar-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .bar-label { width: 60px; font-size: 10px; font-weight: 600; color: var(--pdf-muted); flex-shrink: 0; text-align: right; }
    .bar-track {
      flex: 1; height: 14px;
      background: var(--pdf-bg-alt);
      border: 1px solid var(--pdf-border);
      overflow: hidden;
    }
    .bar-fill  { height: 100%; background: var(--pdf-blue2); }
    .bar-val   { width: 76px; font-size: 10px; font-weight: 700; color: var(--pdf-navy); text-align: right; flex-shrink: 0; }

    /* ══════════════════════════════════════════════════════════════
       CHART WRAPPER
       ═══════════════════════════════════════════════════════════ */
    .chart-wrap {
      border: 1px solid var(--pdf-border);
      background: var(--pdf-bg-light);
      padding: 12px;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════════════════
       RECOMENDACIÓN
       ═══════════════════════════════════════════════════════════ */
    .rec-header {
      background: var(--pdf-navy);
      color: white;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .rec-header .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .rec-header .title {
      font-size: 16px;
      font-weight: 700;
      color: white;
      line-height: 1.4;
    }
    .rec-body {
      background: var(--pdf-bg-light);
      border: 1px solid var(--pdf-border);
      padding: 20px 24px;
      margin-bottom: 14px;
    }

    /* ══════════════════════════════════════════════════════════════
       DISCLAIMER
       ═══════════════════════════════════════════════════════════ */
    .disclaimer {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      padding: 13px 18px;
      font-size: 10px;
      color: #78350F;
      line-height: 1.65;
    }

    /* ══════════════════════════════════════════════════════════════
       NO-PRINT (button to return from PDF view)
       ═══════════════════════════════════════════════════════════ */
    .no-print {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--pdf-navy);
      color: white;
      border: none;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }
    .no-print:hover { background: var(--pdf-blue); }

    /* ══════════════════════════════════════════════════════════════
       @MEDIA PRINT — A4, exact colors, page breaks
       ═══════════════════════════════════════════════════════════ */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      html, body {
        background: white !important;
        height: auto !important;
        overflow: auto !important;
      }
      body::before { display: none !important; }
      #root { height: auto !important; overflow: visible !important; }
      .no-print, .app-container, #error-log { display: none !important; }

      .pdf-report-container {
        background: white !important;
        padding: 0 !important;
      }
      .page {
        width: 210mm !important;
        max-width: 210mm !important;
        min-height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
        page-break-after: always !important;
        break-after: page !important;
      }
      .page:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
      }
      .inner-page { padding-bottom: 80px !important; }
    }
  </style>

</head>

<body>

  <div id="root"></div>
  <div id="error-log"
    style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 16px;"></div>

  <script>
    window.addEventListener('error', function (event) {
      document.getElementById('error-log').innerText += 'Error: ' + event.message + '\n';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.getElementById('error-log').innerText += 'Promise Error: ' + event.reason + '\n';
    });
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ── FORMATEADOR CLP ─────────────────────────────────────────────────────────
    const fmtCLP = (n) => n?.toLocaleString("es-CL", { style: "currency", currency: "CLP", minimumFractionDigits: 0, maximumFractionDigits: 0 });

    const chartColors = {
      sinPrepago: "#AEACA6", // Gray 400
      conPrepagoPlazo: "#185FA5", // Blue 600 institutional
      conPrepagoCuota: "#3B6D11", // Emerald 600 BlackRock green
      grid: "rgba(0,0,0,0.06)",
      text: "#6B6860",
      card: "#FAFAF9",
    };

    // ── HELPERS FINANCIEROS (Centralizados en financial_logic.js) ────────────────
    // Ahora se destructurarán dentro de los componentes para asegurar disponibilidad.

    const costosPrepagoOpciones = [
      { value: "1.5", label: "1,5 meses de interés por prepago" },
      { value: "0", label: "Sin costo de prepago" }
    ];

    const fmt = (n, d = 1) => n?.toLocaleString("es-CL", { minimumFractionDigits: d, maximumFractionDigits: d });
    const fmtM = (m) => {
      const a = Math.floor(m / 12), mo = m % 12;
      return a > 0 ? `${a} ${a === 1 ? "Año" : "Años"} ${mo > 0 ? mo + " " + (mo === 1 ? "Mes" : "Meses") : ""}`.trim() : `${mo} ${mo === 1 ? "Mes" : "Meses"}`;
    };

    // ── COMPONENTES UI ──────────────────────────────────────────────────────────

    const SidebarClock = () => {
      const [now, setNow] = React.useState(new Date());
      React.useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      const hours = String(now.getHours()).padStart(2, '0');
      const mins  = String(now.getMinutes()).padStart(2, '0');
      const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
      return (
        <div style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: "10px 12px", marginBottom: 8 }}>
          <div style={{ fontSize: 26, fontWeight: 700, color: "var(--color-text-primary)", fontFamily: "var(--font-display)", lineHeight: 1.1 }}>
            {hours}:{mins}
          </div>
          <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2, fontWeight: 500 }}>
            {dateStr}
          </div>
        </div>
      );
    };

    const Input = ({ label, value, onChange, min, max, step = "any", prefix, suffix }) => (
      <div className="input-group">
        <label className="input-label">{label}</label>
        <div className="input-wrapper">
          {prefix && <span className="input-prefix">{prefix}</span>}
          <input type="number" className="styled-input" value={value} onChange={e => onChange(e.target.value)} min={min} max={max} step={step} />
          {suffix && <span className="input-suffix">{suffix}</span>}
        </div>
      </div>
    );

    const Select = ({ label, value, onChange, options }) => (
      <div className="input-group">
        <label className="input-label">{label}</label>
        <div className="input-wrapper">
          <select className="styled-input" value={value} onChange={e => onChange(e.target.value)}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      </div>
    );

    const Stat = ({ label, value, sub, colorClass = "cyan", big }) => (
      <div className={`stat-box ${colorClass}`}>
        <div className="stat-label">{label}</div>
        <div className={`stat-value ${big ? 'big' : ''}`}>{value}</div>
        {sub && <div className="stat-sub">{sub}</div>}
      </div>
    );

    // ── TABLA DE AMORTIZACIÓN MENSUAL ──────────────────────────────────────────
    const TablaAmortizacion = ({ detalle, historial = [], mesesPagados = 0, startYear, startMonth, seguros, moneda = "UF", valorUF = 38000 }) => {
      const filaVigenteRef = React.useRef(null);
      const scrollContainerRef = React.useRef(null);

      // Unir historia ya pagada + filas futuras del detalleMensual
      const todasLasFilas = React.useMemo(() => [
        ...historial,
        ...(detalle || []).map(d => ({ ...d, mes: mesesPagados + d.mes }))
      ], [historial, detalle, mesesPagados]);

      // Calcular año calendario para cada fila
      const getCalYear = (mesAbsoluto) => {
        if (!startYear) return Math.floor((mesAbsoluto - 1) / 12) + 1;
        const d = new Date(startYear, (startMonth || 1) - 1);
        d.setMonth(d.getMonth() + mesAbsoluto - 1);
        return d.getFullYear();
      };

      // Scroll solo dentro del contenedor — no mueve la página
      React.useEffect(() => {
        const fila = filaVigenteRef.current;
        const contenedor = scrollContainerRef.current;
        if (fila && contenedor) {
          const offset = fila.offsetTop - contenedor.clientHeight / 2 + fila.clientHeight / 2;
          contenedor.scrollTop = Math.max(0, offset);
        }
      }, [mesesPagados]);

      if (!todasLasFilas.length) return null;

      const formatVal = (val) => moneda === "CLP" ? fmtCLP(val * valorUF) : `UF ${fmt(val, 2)}`;
      const formatSmallVal = (val, dec = 0) => moneda === "CLP" ? fmtCLP(val * valorUF) : `UF ${fmt(val, dec)}`;

      return (

                  <th style={{ padding: "12px 16px", borderBottom: "2px solid #E5E7EB", color: "#A32D2D" }}>Multa</th>

              <tbody>
                {todasLasFilas.map((d, i) => {
                  const mesAbs = d.mes;

                  if (esVigente)  rowBg = "#EDE8E0";

                      </td>

                      <td style={{ padding: "10px 16px" }}>{formatVal(d.dividendoTotal ?? (d.cuotaBase + seguros))}</td>
                      <td style={{ padding: "10px 16px", color: esPagado ? "inherit" : "#6B6860" }}>{formatVal(d.interes)}</td>

    };


    // ── GRÁFICO (NATIVE CHART.JS) ────────────────────────────────────────────────
    const GraficoSaldo = ({ evolucionSin, evolucionPlazo, evolucionCuota, mesesRestantes, saldoInicial, cr }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current || !cr) return;
        const { tasaMensual, cuotaMensual } = window.FinancialLogic;

        const dataMap = {};
        const mp = +cr.mesesPagados;
        const r = tasaMensual(+cr.tna);
        const cuota = cuotaMensual(+cr.capital, +cr.tna, +cr.plazo);

        let saldoHist = +cr.capital;
        for (let i = 0; i <= mp; i++) {
          dataMap[i] = { mes: i, sinPrepago: Math.round(saldoHist), conPrepagoPlazo: Math.round(saldoHist), conPrepagoCuota: Math.round(saldoHist) };
          if (i < mp) saldoHist -= Math.min(cuota - saldoHist * r, saldoHist);
        }

        evolucionSin.forEach(p => {
          const m = p.mes + mp;
          if (!dataMap[m]) dataMap[m] = { mes: m };
          dataMap[m].sinPrepago = Math.round(p.saldo);
        });

        if (evolucionPlazo) {
          evolucionPlazo.forEach(p => {
            const m = p.mes + mp;
            if (!dataMap[m]) dataMap[m] = { mes: m };
            dataMap[m].conPrepagoPlazo = Math.round(p.saldo);
          });
        }

        if (evolucionCuota) {
          evolucionCuota.forEach(p => {
            const m = p.mes + mp;
            if (!dataMap[m]) dataMap[m] = { mes: m };
            dataMap[m].conPrepagoCuota = Math.round(p.saldo);
          });
        }

        const rawData = Object.values(dataMap).sort((a, b) => a.mes - b.mes);
        const labels = rawData.map(d => {
          if (d.mes === 0) return "Inicio";
          if (d.mes === mp) return "Hoy";
          if (d.mes % 12 === 0) return `Año ${d.mes / 12}`;
          return d.mes;
        });

        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const ctx = chartRef.current.getContext('2d');

        // Create Gradients for Corporate Look
        const gradSin = ctx.createLinearGradient(0, 0, 0, 400);
        gradSin.addColorStop(0, 'rgba(174, 172, 166, 0.12)');
        gradSin.addColorStop(1, 'rgba(174, 172, 166, 0.01)');

        const gradPlazo = ctx.createLinearGradient(0, 0, 0, 400);
        gradPlazo.addColorStop(0, 'rgba(24, 95, 165, 0.14)');
        gradPlazo.addColorStop(1, 'rgba(24, 95, 165, 0.01)');

        const gradCuota = ctx.createLinearGradient(0, 0, 0, 400);
        gradCuota.addColorStop(0, 'rgba(59, 109, 17, 0.14)');
        gradCuota.addColorStop(1, 'rgba(59, 109, 17, 0.01)');

        const endLinesPlugin = {
          id: 'endLines',
          afterDatasetsDraw(chart) {
            const { ctx: c, chartArea: { top, bottom, left, right }, scales: { x } } = chart;

            const drawVertical = (mes, color, text, yOffset = 0) => {
              const index = rawData.findIndex(d => d.mes === mes);
              if (index === -1) return;
              const xPos = x.getPixelForValue(index);
              if (xPos < left || xPos > right) return;

              const yBase = top + (bottom - top) * 0.2;
              const yPos = yBase + yOffset;

              c.save();

              // Shadow for the badge
              c.shadowColor = 'rgba(0, 0, 0, 0.12)';
              c.shadowBlur = 4;
              c.shadowOffsetY = 1;

              // Badge Background (Pill shape) - Glassmorphism
              const padding = 10;
              c.font = '700 10.5px Inter';
              const fullText = `Termino del Credito ${text}`;
              const textWidth = c.measureText(fullText).width;
              const badgeWidth = textWidth + (padding * 2);
              const badgeHeight = 22;

              c.beginPath();
              c.roundRect(xPos - badgeWidth / 2, yPos - badgeHeight / 2, badgeWidth, badgeHeight, 11);
              // semi-transparent background
              c.fillStyle = color.replace(')', ', 0.82)').replace('rgb', 'rgba');
              if (!color.includes('rgba')) {
                // Fallback if chartColors are hex
                c.fillStyle = color + 'D1';
              }
              c.fill();

              // Border for the badge
              c.strokeStyle = '#ffffff';
              c.lineWidth = 1.5;
              c.stroke();

              // Reset shadow for text and line
              c.shadowColor = 'transparent';

              // Vertical Line (Starts at bottom, ends at badge) - Subtler
              c.beginPath();
              c.lineWidth = 1;
              c.setLineDash([3, 3]);
              c.strokeStyle = color;
              c.globalAlpha = 0.6;
              c.moveTo(xPos, bottom);
              c.lineTo(xPos, yPos + badgeHeight / 2);
              c.stroke();
              c.globalAlpha = 1.0;

              // Text
              c.fillStyle = '#fff';
              c.textAlign = 'center';
              c.textBaseline = 'middle';
              c.fillText(fullText, xPos, yPos);

              c.restore();
            };

            const mpVal = +cr.mesesPagados;
            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth();

            const simResults = [];
            if (evolucionPlazo && evolucionPlazo.length) {
              const simMes = evolucionPlazo[evolucionPlazo.length - 1].mes || 0;
              simResults.push({ mes: mpVal + simMes, type: 'plazo', color: chartColors.conPrepagoPlazo, year: currentYear + Math.floor((currentMonth + simMes) / 12) });
            }
            if (evolucionCuota && evolucionCuota.length) {
              const simMes = evolucionCuota[evolucionCuota.length - 1].mes || 0;
              simResults.push({ mes: mpVal + simMes, type: 'cuota', color: chartColors.conPrepagoCuota, year: currentYear + Math.floor((currentMonth + simMes) / 12) });
            }

            // Sort by month to handle collision detection predictably
            simResults.sort((a, b) => a.mes - b.mes);

            simResults.forEach((res, i) => {
              let offset = 0;
              // Increased threshold to 84 months (7 years) to account for badge width overlap
              if (i > 0 && Math.abs(res.mes - simResults[i - 1].mes) < 84) {
                offset = 55; // Increased staggering distance for maximum clarity
              }
              drawVertical(res.mes, res.color, res.year, offset);
            });
          }
        };

        chartInstance.current = new window.Chart(ctx, {
          type: 'line',
          plugins: [endLinesPlugin],
          data: {
            labels,
            datasets: [
              {
                label: 'Sin Prepago',
                data: rawData.map(d => d.sinPrepago),
                borderColor: chartColors.sinPrepago,
                backgroundColor: gradSin,
                borderWidth: 2,
                borderDash: [5, 5],
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 6,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#FAFAF9',
                tension: 0.4
              },
              {
                label: 'Reduce Plazo',
                data: rawData.map(d => d.conPrepagoPlazo),
                borderColor: chartColors.conPrepagoPlazo,
                backgroundColor: gradPlazo,
                borderWidth: 3,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 8,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#FAFAF9',
                tension: 0.4
              },
              {
                label: 'Reduce Cuota',
                data: rawData.map(d => d.conPrepagoCuota),
                borderColor: chartColors.conPrepagoCuota,
                backgroundColor: gradCuota,
                borderWidth: 3,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 8,
                pointHoverBorderWidth: 3,
                pointHoverBackgroundColor: '#FAFAF9',
                tension: 0.4
              }
            ],
          },
          options: {
            layout: { padding: { top: 10, right: 20 } },
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'top',
                align: 'end',
                labels: {
                  color: '#6B6860',
                  font: { family: 'Inter', size: 12, weight: '600' },
                  usePointStyle: true,
                  boxWidth: 8,
                  boxHeight: 8
                }
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: '#FAFAF9',
                titleColor: '#1A1915',
                titleFont: { family: 'Inter', size: 14, weight: '700' },
                bodyColor: '#6B6860',
                bodyFont: { family: 'Inter', size: 13 },
                borderColor: '#DDDAD3',
                borderWidth: 1,
                padding: 12,
                cornerRadius: 8,
                boxPadding: 6,
                usePointStyle: true,
                callbacks: {
                  label: (context) => ` ${context.dataset.label}: UF ${fmt(context.parsed.y, 0)}`
                }
              },
              hoyLine: {
                color: '#A32D2D',
                dash: [4, 4],
                width: 2
              }
            },
            scales: {
              x: {
                grid: {
                  display: true,
                  color: 'rgba(0, 0, 0, 0.04)',
                  drawBorder: false
                },
                ticks: {
                  color: '#AEACA6',
                  font: { family: 'Inter', size: 11 },
                  maxTicksLimit: 12,
                  callback: function (value, index) {
                    const mes = rawData[index].mes;
                    if (mes === 0) return "Inicio";
                    if (mes === +cr.mesesPagados) return "Hoy";
                    if (mes % 12 === 0) return `Año ${mes / 12}`;
                    return null;
                  }
                }
              },
              y: {
                border: { display: false },
                grid: {
                  color: 'rgba(0, 0, 0, 0.05)',
                  drawTicks: false
                },
                ticks: {
                  color: '#6B6860',
                  font: { family: 'Inter', size: 13, weight: '500' },
                  padding: 14,
                  callback: (v) => `UF ${fmt(v, 0)}`
                }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
          }
        });

        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
        };
      }, [evolucionSin, evolucionPlazo, evolucionCuota, mesesRestantes, saldoInicial, cr]);

      return (
        <div style={{ height: 400, padding: "10px 0", position: 'relative' }}>
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // ── GRÁFICO BARRAS CUOTAS (NUEVO) ──────────────────────────────────────────
    const GraficoCuotas = ({ evolucionCuota, cuotaBase, destino, valorUF, moneda = "UF" }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current || !evolucionCuota || evolucionCuota.length === 0) return;

        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const isCLP = moneda === "CLP" && valorUF;
        const conv = (v) => isCLP ? v * valorUF : v;
        const fmtVal = (v) => isCLP ? `$${Math.round(v).toLocaleString('es-CL')}` : `UF ${fmt(v, 1)}`;
        const fmtVal2 = (v) => isCLP ? `$${Math.round(v).toLocaleString('es-CL')}` : `UF ${fmt(v, 2)}`;
        const prefix = isCLP ? "CLP" : "UF";
        const cuotaBaseConv = conv(cuotaBase);

        gradCon.addColorStop(1, 'rgba(24, 95, 165, 0.15)');

        // Custom plugin: draw horizontal reference line + value labels on bars
        const refLinePlugin = {

            },
            plugins: {

                display: true,
                position: 'top',
                align: 'end',
                labels: {
                  color: '#6B6860',
                  font: { family: 'Inter', size: 12, weight: '600' },
                  usePointStyle: true,
                  boxWidth: 10,
                  generateLabels: () => [
                    { text: 'Cuota Original (fija)', fillStyle: '#A32D2D', strokeStyle: '#A32D2D', lineWidth: 2, lineDash: [6, 4], pointStyle: 'line', fontColor: '#6B6860' },
                    { text: 'Cuota con Prepago', fillStyle: 'rgba(24, 95, 165, 0.75)', strokeStyle: '#185FA5', lineWidth: 0, pointStyle: 'rect', fontColor: '#6B6860' }
                  ]
                }
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: '#FAFAF9',
                titleColor: '#1A1915',

    // ── ESCENARIO 1 (TASAS E INFLACIÓN) ────────────────────────────────────────────────────────
    const Escenario1 = ({ cr, saldoActual, mesesRestantes, interesesBase, pr, cuotaBase, valorUF, cae, inflacion, setInflacion, retornoInv, setRetornoInv }) => {
      // Evaluar escenario actual
      const { simularPrepago } = window.FinancialLogic;
      const minPrepago = Math.ceil(saldoActual * 0.05); // Límite legal 5%
      const montoEstrategico = Math.max(minPrepago, +pr.monto);
      const { totalMultas } = simularPrepago(
        saldoActual, +cr.tna, mesesRestantes, montoEstrategico, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros
      );

      // MODELO B: Arbitraje de Tasas (Criterio de Fisher Modificado)
      // tnaDecimal = TNA del crédito (costo de la deuda), NO seguros
      const tnaDecimal = +cr.tna / 100;
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;

      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1; // Costo Efectivo Nominal
      const deltaFisher = i_nom - retDecimal; // Diferencial Neto
      const piElegible = ((1 + retDecimal) / (1 + tnaDecimal)) - 1; // Punto de equilibrio inflacionario

      // Decisión Final
      const esDominante = deltaFisher > 0;

      return (
        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          <div className="grid-2" style={{ gap: 16 }}>
            {/* ────── MODELO A: PUNTO DE EQUILIBRIO DE INFLACIÓN ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#1A1915", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>A.</span> Punto de Equilibrio (π*)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                En Chile, la deuda hipotecaria está en UF y la inversión en pesos (CLP). Este modelo calcula la <strong>inflación exacta</strong> en la que tu crédito se encarece tanto que empata con la rentabilidad de tu inversión.
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#F3F2F0", padding: "16px", borderRadius: 8, border: "1px solid #E5E7EB", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4, textTransform: "uppercase" }}>Break-even (π*)</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1A1915" }}>{(piElegible * 100).toFixed(2)}%</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4, textTransform: "uppercase" }}>Tu Proyección (π)</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: inflacion > (piElegible * 100) ? "var(--accent-emerald)" : "var(--accent-rose)" }}>{(+inflacion).toFixed(2)}%</div>
                </div>
              </div>

              {/* Regla de Decisión Dinámica */}
              {(() => {
                const piPct = piElegible * 100;
                const upperBound = piPct + 0.25;
                const lowerBound = piPct - 0.25;
                const inf = +inflacion;
                let bg, color, title, desc;

                if (inf > upperBound) {
                  bg = "rgba(5,150,105,0.08)"; color = "#3B6D11";
                  title = "🟢 PREPAGO GANA"; desc = "La inflación proyectada es demasiado alta. Tu deuda en UF está creciendo más rápido de lo que rendiría el capital en el banco. Matemática y financieramente, te conviene liquidar la deuda.";
                } else if (inf < lowerBound) {
                  bg = "rgba(220,38,38,0.08)"; color = "#A32D2D";
                  title = "🔴 INVERSIÓN GANA"; desc = "Con una inflación baja, la UF crece lento. El dinero tiene mucha más fuerza multiplicadora rindiendo en tu instrumento financiero que destruyendo pasivos estáticos.";
                } else {
                  bg = "rgba(217,119,6,0.08)"; color = "#BA7517";
                  title = "🟡 ZONA DE INDIFERENCIA"; desc = `La inflación proyectada está extremadamente cerca del punto de equilibrio [${lowerBound.toFixed(2)}% - ${upperBound.toFixed(2)}%]. En este margen, la rentabilidad es casi idéntica; elige la opción que te dé mayor liquidez o tranquilidad psicológica.`;
                }

                return (
                  <div style={{ background: bg, border: `1px solid ${bg.replace("0.1)", "0.3)")}`, padding: "16px", borderRadius: 8, marginTop: "auto" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: color, marginBottom: 8, letterSpacing: "0.05em" }}>{title}</div>
                    <div style={{ fontSize: 12, color: color, opacity: 0.9, lineHeight: 1.4 }}>{desc}</div>
                  </div>
                );
              })()}
            </div>

            {/* ────── MODELO B: ARBITRAJE Y PARIDAD ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#1A1915", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>B.</span> Arbitraje y Paridad (Fisher)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                Transforma el costo en UF de tu crédito a una <strong>Tasa Anual Nominal (CLP)</strong> para compararlo directamente (peras con peras) con el retorno de tu inversión bancaria.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 12 }}>
                <div style={{ background: "#F3F2F0", padding: 12, borderRadius: 8, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>Costo Total Efectivo Nominal</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "var(--accent-cyan)" }}>{(i_nom * 100).toFixed(2)}%</div>
                </div>
                <div style={{ background: deltaFisher > 0 ? "rgba(5,150,105,0.08)" : "rgba(220,38,38,0.08)", padding: 12, borderRadius: 8, textAlign: "center", border: `1px solid ${deltaFisher > 0 ? 'rgba(5,150,105,0.2)' : 'rgba(220,38,38,0.2)'}` }}>
                  <div style={{ fontSize: 10, color: deltaFisher > 0 ? "#3B6D11" : "#A32D2D", marginBottom: 6, textTransform: "uppercase" }}>Spread de Arbitraje Neto</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: deltaFisher > 0 ? "#3B6D11" : "#A32D2D" }}>
                    {deltaFisher > 0 ? '+' : ''}{(deltaFisher * 100).toFixed(2)}%
                  </div>
                </div>
                <div style={{ background: "#F3F2F0", padding: 12, borderRadius: 8, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>Retorno Nominal Inversión</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: "#1A1915" }}>{(+retornoInv).toFixed(2)}%</div>
                </div>
              </div>
              <div style={{
                background: esDominante ? "rgba(5,150,105,0.08)" : "rgba(220,38,38,0.08)",
                border: `1px solid ${esDominante ? 'rgba(5,150,105,0.2)' : 'rgba(220,38,38,0.2)'}`,
                color: esDominante ? "#3B6D11" : "#A32D2D",
                padding: "16px", borderRadius: 8, marginTop: "auto"
              }}>
                <div style={{ fontSize: 13, fontWeight: 800, textAlign: "center", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>
                  {esDominante ? '🟢 Costo Crédito > Retorno Inversión' : '🔴 Costo Crédito < Retorno Inversión'}
                </div>
                <div style={{ fontSize: 12, textAlign: "center", opacity: 0.9, lineHeight: 1.4, color: esDominante ? "#3B6D11" : "#A32D2D" }}>
                  {esDominante
                    ? `Tu crédito te cuesta ${(i_nom * 100).toFixed(2)}% anual nominal, pero tu dinero solo rinde ${(+retornoInv).toFixed(2)}%. Estás perdiendo patrimonio manteniendo dinero invertido en lugar de pagar deuda cara.`
                    : `Cerrar este crédito es ineficiente. El costo financiero en UF sale más barato (${(i_nom * 100).toFixed(2)}% nominal) que lo que el banco te paga por mantener el dinero en fondos (${(+retornoInv).toFixed(2)}%). Acumula capital tranquilo.`}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── ESCENARIO 2 (VALOR PRESENTE & RIESGO ESTOCÁSTICO) ───────────────────────────────────
    const Escenario2 = ({ cr, saldoActual, mesesRestantes, interesesBase, pr, cuotaBase, valorUF, cae, inflacion, setInflacion, retornoInv, setRetornoInv }) => {
      // Evaluar escenario actual
      const { simularPrepago, tasaMensual } = window.FinancialLogic;
      const minPrepago = Math.ceil(saldoActual * 0.05);
      const montoEstrategico = Math.max(minPrepago, +pr.monto);
      const { mesesReales, totalIntereses, totalMultas } = simularPrepago(
        saldoActual, +cr.tna, mesesRestantes, montoEstrategico, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros
      );

      const mesesAhorrados = Math.max(0, mesesRestantes - mesesReales);
      const ahorroIntereses = interesesBase - totalIntereses;
      const ahorroSeguros = mesesAhorrados * (+cr.seguros || 0);
      const ahorroBruto = ahorroIntereses + ahorroSeguros;
      const ahorroNeto = ahorroBruto - totalMultas;

      // Variables Macro para Monte Carlo
      // tnaDecimal = TNA del crédito (costo de la deuda), NO seguros
      const tnaDecimal = +cr.tna / 100;
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;
      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1;
      const deltaFisher = i_nom - retDecimal;

      // MODELO C: Valor Presente Neto (VPN)
      const rhoMensual = tasaMensual(retornoInv);
      const flujoMensual = cuotaBase + (+cr.seguros || 0);
      const calcPV = (flujo, n, r) => r === 0 ? flujo * n : flujo * (1 - Math.pow(1 + r, -n)) / r;

      const vpContrato = calcPV(flujoMensual, mesesRestantes, rhoMensual);
      const vpPrepago = montoEstrategico + totalMultas + calcPV(flujoMensual, mesesReales, rhoMensual);
      const ahorroVPN = vpContrato - vpPrepago;
      const convieneVPN = ahorroVPN > 0;

      // MODELO D: Simulación Estocástica Simplificada (Monte Carlo)
      const zScore = deltaFisher / Math.sqrt(0.015 ** 2 + 0.02 ** 2);
      let probConveniencia = 1 / (1 + Math.exp(-1.702 * zScore));
      if (deltaFisher < -0.02) probConveniencia = 0.05 + Math.random() * 0.1;
      if (deltaFisher > 0.05) probConveniencia = 0.90 + Math.random() * 0.05;

      const volatilidadAhorro = ahorroNeto * 0.35;
      const mcRango = [Math.max(0, ahorroNeto - volatilidadAhorro), ahorroNeto + volatilidadAhorro];

      return (
        <div className="animate-fade" style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          <div className="grid-2" style={{ gap: 16 }}>
            {/* ────── MODELO C: VALOR PRESENTE NETO ────── */}
            <div className="glass-card" style={{ padding: "16px", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#1A1915", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-indigo)" }}>C.</span> Valor Presente Neto (VPN)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.5 }}>
                El dinero en el futuro vale menos que hoy. Este modelo <strong>descuenta todos los flujos de tus dividendos futuros</strong> de vuelta al día de hoy, usando tu rentabilidad de inversión como barrera de descuento.
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, background: "#F3F2F0", padding: "12px", borderRadius: "8px 8px 0 0", borderBottom: "1px solid #E5E7EB" }}>
                <div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", textTransform: "uppercase" }}>VP Contrato Base</div>
                  <div style={{ fontSize: 11, color: "#AEACA6", marginTop: 2 }}>Sin prepagar nada</div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1915", alignSelf: "center" }}>UF {fmt(vpContrato)}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20, background: "#F3F2F0", padding: "12px", borderRadius: "0 0 8px 8px" }}>
                <div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", textTransform: "uppercase" }}>VP Estrategia (+ Prepago)</div>
                  <div style={{ fontSize: 11, color: "#AEACA6", marginTop: 2 }}>Inyección + Nuevos flujos</div>
                </div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1915", alignSelf: "center" }}>UF {fmt(vpPrepago)}</div>
              </div>

              <div style={{
                background: convieneVPN ? "rgba(5,150,105,0.08)" : "rgba(220,38,38,0.08)",
                border: `1px solid ${convieneVPN ? 'rgba(5,150,105,0.2)' : 'rgba(220,38,38,0.2)'}`,
                padding: "16px", borderRadius: 8, marginTop: "auto"
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: convieneVPN ? "#3B6D11" : "#A32D2D", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                    Creación Neta de Patrimonio
                  </span>
                  <span style={{ fontSize: 24, fontWeight: 800, color: convieneVPN ? "#3B6D11" : "#A32D2D" }}>
                    {convieneVPN ? "+" : ""}UF {fmt(ahorroVPN)}
                  </span>
                </div>
                <div style={{ fontSize: 12, color: convieneVPN ? "#3B6D11" : "#A32D2D", opacity: 0.9, lineHeight: 1.4 }}>
                  {convieneVPN
                    ? `Al ejecutar esta estrategia, estás "destruyendo obligaciones" y agregando directamente riqueza presente y pura a tu hoja de balance personal.`
                    : `Destinar capital hoy para comprar deuda barata está "destruyendo" valor presente en tu patrimonio neto en favor del banco.`}
                </div>
              </div>
            </div>

            {/* ────── MODELO D: MONTE CARLO ────── */}
            <div className="glass-card" style={{ padding: "16px", background: "linear-gradient(135deg, rgba(24,24,27,1) 0%, rgba(245,158,11,0.05) 100%)", display: "flex", flexDirection: "column" }}>
              <h3 style={{ fontSize: 14, color: "#1A1915", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "var(--accent-amber)" }}>D.</span> Monte Carlo (Probabilidades)
              </h3>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 20, lineHeight: 1.5 }}>
                Las inversiones rara vez tienen un retorno fijo asegurado. Este modelo somete tu retorno del {retornoInv}% a un entorno de <strong>caos y volatilidad estocástica</strong> para medir la verdadera probabilidad de vencer al banco en el mundo real.
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24, background: "#F3F2F0", padding: "16px", borderRadius: 8, border: "1px solid #E5E7EB", flexWrap: "wrap" }}>
                <div style={{ fontSize: 42, fontWeight: 800, color: "var(--accent-amber)", lineHeight: 1 }}>{(probConveniencia * 100).toFixed(1)}%</div>
                <div style={{ fontSize: 12, color: "var(--text-muted)", lineHeight: 1.4 }}>
                  <strong>Probabilidad de Éxito.</strong><br />
                  Si corremos esta estrategia 10,000 veces en la economía, esta es la cantidad de veces que el pago del crédito es superior a tu inversión base.
                </div>
              </div>

              <div style={{ background: "#F3F2F0", padding: "16px", borderRadius: 8, marginTop: "auto" }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 10, textTransform: "uppercase", fontWeight: 600 }}>Espectro de Ahorro Neto UF (P10 - P90)</div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1915" }}>UF {fmt(mcRango[0], 0)}</div>
                    <div style={{ fontSize: 10, color: "#AEACA6" }}>Peor Escenario</div>
                  </div>
                  <div style={{ flex: 1, position: "relative" }}>
                    <div style={{ height: 6, background: "#DDDAD3", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ width: "100%", height: "100%", background: "linear-gradient(90deg, rgba(217, 119, 6, 0.15), rgba(217, 119, 6, 0.6), rgba(217, 119, 6, 0.15))", borderRadius: 3, opacity: 0.8 }}></div>
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1915" }}>UF {fmt(mcRango[1], 0)}</div>
                    <div style={{ fontSize: 10, color: "#AEACA6" }}>Mejor Escenario</div>
                  </div>
                </div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 12, textAlign: "center", fontStyle: "italic" }}>
                  Bajo un estrés de mercado del 35% de desviación estándar.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── GRÁFICO ESCENARIOS (MULTI-LÍNEA) ─────────────────────────────────────────
    const GraficoEscenarios = ({ saldoActual, cr, mesesRestantes, pr, cuotaBase }) => {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      React.useEffect(() => {
        if (!chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        const { simularPrepago, calcularInteresesTotales } = window.FinancialLogic;
        const minPrepago = Math.ceil(saldoActual * 0.05);

        // Generate the same 4 strategic amounts used in Escenarios
        const findOptimalAmount = () => {
          let bestRoi = -Infinity, bestAmount = minPrepago;
          const interesesBase = calcularInteresesTotales(saldoActual, +cr.tna, mesesRestantes);
          for (let m = minPrepago; m <= Math.min(saldoActual * 0.5, 2000); m += 10) {
            const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros);
            const roi = s.totalPrepagado > 0 ? ((interesesBase - s.totalIntereses - s.totalMultas) / s.totalPrepagado) * 100 : 0;
            if (roi > bestRoi) { bestRoi = roi; bestAmount = m; }
          }
          const lo = Math.max(minPrepago, bestAmount - 15), hi = Math.min(saldoActual, bestAmount + 15);
          for (let m = lo; m <= hi; m++) {
            const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros);
            const roi = s.totalPrepagado > 0 ? ((interesesBase - s.totalIntereses - s.totalMultas) / s.totalPrepagado) * 100 : 0;
            if (roi > bestRoi) { bestRoi = roi; bestAmount = m; }
          }
          return bestAmount;
        };
        const montoOptimo = findOptimalAmount();
        const candidates = new Set([minPrepago, montoOptimo]);
        const medio = Math.round(Math.max(montoOptimo * 1.5, minPrepago * 3));
        if (medio < saldoActual && medio !== montoOptimo) candidates.add(medio);
        const agresivo = Math.round(Math.max(montoOptimo * 3, minPrepago * 6));
        if (agresivo < saldoActual && agresivo !== montoOptimo && agresivo !== medio) candidates.add(agresivo);
        [minPrepago * 2, montoOptimo * 2].map(Math.round).forEach(e => {
          if (candidates.size < 4 && e > minPrepago && e < saldoActual && !candidates.has(e)) candidates.add(e);
        });
        const montos = [...candidates].sort((a, b) => a - b).slice(0, 4);

        // Colors for the 4 curves
        const curveColors = ['#BA7517', '#3B6D11', '#185FA5', '#534AB7'];

        // Generate datasets: baseline + 4 scenarios
        // Baseline: sin prepago
        const baseSim = simularPrepago(saldoActual, +cr.tna, mesesRestantes, 0, pr.frecuencia, 0, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros);
        const basePoints = baseSim.evolucionSin.filter((_, i) => i % 6 === 0 || i === baseSim.evolucionSin.length - 1)
          .map(p => ({ x: p.mes, y: p.saldo }));

        const datasets = [{
          label: 'Sin Prepago',
          data: basePoints,
          borderColor: '#AEACA6',
          borderWidth: 2,
          borderDash: [6, 4],
          pointRadius: 0,
          tension: 0.3,
          fill: false
        }];

        montos.forEach((m, i) => {
          const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, m, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros);
          const points = s.evolucionCon.filter((_, j) => j % 6 === 0 || j === s.evolucionCon.length - 1)
            .map(p => ({ x: p.mes, y: p.saldo }));
          datasets.push({
            label: `UF ${m}${m === montoOptimo ? ' (Óptimo)' : ''}`,
            data: points,
            borderColor: curveColors[i],
            borderWidth: m === montoOptimo ? 3 : 2,
            pointRadius: 0,
            tension: 0.3,
            fill: false
          });
        });

        chartInstance.current = new window.Chart(ctx, {
          type: 'line',
          data: { datasets },
          options: {
            layout: { padding: { top: 10, right: 16, left: 8 } },
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 600, easing: 'easeOutQuart' },
            plugins: {
              legend: {
                position: 'top', align: 'end',
                labels: {
                  color: '#6B6860',
                  font: { family: 'Inter', size: 11, weight: '600' },
                  usePointStyle: true, boxWidth: 8, padding: 16
                }
              },
              tooltip: {
                mode: 'nearest',
                intersect: false,
                backgroundColor: '#FAFAF9',
                titleColor: '#1A1915',
                titleFont: { family: 'Inter', size: 13, weight: '700' },
                bodyColor: '#6B6860',
                bodyFont: { family: 'Inter', size: 12 },
                borderColor: '#DDDAD3',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 6,
                displayColors: true,
                callbacks: {
                  title: (items) => `Mes ${items[0]?.parsed?.x || 0}`,
                  label: (ctx) => ` ${ctx.dataset.label}: UF ${fmt(ctx.parsed.y, 0)}`
                }
              }
            },
            scales: {
              x: {
                type: 'linear',
                title: { display: true, text: 'Meses', color: '#AEACA6', font: { family: 'Inter', size: 11 } },
                grid: { display: false },
                border: { display: false },
                ticks: {
                  color: '#AEACA6',
                  font: { family: 'Inter', size: 11 },
                  maxRotation: 0,
                  callback: (v) => {
                    const a = Math.floor(v / 12);
                    return a > 0 ? `Año ${a}` : `${v}m`;
                  }
                }
              },
              y: {
                border: { display: false },
                beginAtZero: true,
                grid: { color: 'rgba(0, 0, 0, 0.05)', drawTicks: false },
                ticks: {
                  color: '#AEACA6',
                  font: { family: 'Inter', size: 11 },
                  padding: 10,
                  callback: (v) => `UF ${fmt(v, 0)}`
                }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [saldoActual, cr, mesesRestantes, pr, cuotaBase]);

      return (
        <div style={{ height: "100%", position: "relative" }}>
          <canvas ref={chartRef}></canvas>
        </div>
      );
    };

    // ── REPORTE PDF (Oculto en DOM) ──────────────────────────────────────────────
    const ReportePDF = React.forwardRef(({ cr, pr, sim, saldoActual, mesesRestantes, cuotaBase, interesesBase, ahorroNeto, mesesAhorrados, inflacion, retornoInv, simularPrepago }, ref) => {
      const { tasaMensual } = window.FinancialLogic;
      // Formateadores locales para PDF
      const fNum = (num) => (+num).toLocaleString('es-CL', { maximumFractionDigits: 1 });
      const fMon = (num) => `UF ${fNum(num)}`;
      const fmtM = (m) => `${Math.floor(m / 12)}a ${m % 12}m`;
      // Dividendo total (cuota + seguros)
      const dividendoTotal = cuotaBase + (+cr.seguros || 0);

      // Wrapper para simular escenarios
      const runSim = (monto) => {
        const s = simularPrepago(saldoActual, +cr.tna, mesesRestantes, monto, pr.frecuencia, +pr.mesInicio - +cr.mesesPagados, pr.destino, cuotaBase, +cr.costoPrepago, +cr.seguros);
        const ahorroInt = interesesBase - s.totalIntereses;
        return {
          ...s,
          ahorroNeto: ahorroInt - s.totalMultas,
          ahorroIntereses: ahorroInt,
          mesesAhorrados: mesesRestantes - s.mesesReales,
          nuevaCuota: s.nuevaCuota
        };
      };

      // Métricas Avanzadas (Fisher & VPN)
      const tnaDecimal = (+cr.tna) / 100;
      const infDecimal = inflacion / 100;
      const retDecimal = retornoInv / 100;
      const i_nom = ((1 + tnaDecimal) * (1 + infDecimal)) - 1; // Costo Nominal
      const deltaFisher = i_nom - retDecimal;

      const rhoMensual = tasaMensual(retornoInv);
      const vpContrato = cuotaBase * (1 - Math.pow(1 + rhoMensual, -mesesRestantes)) / rhoMensual;
      const vpPrepago = pr.monto + sim.totalMultas + (sim.nuevaCuota * (1 - Math.pow(1 + rhoMensual, -sim.mesesReales)) / rhoMensual);
      const ahorroVPN = vpContrato - vpPrepago;

      // Escenarios comparativos (Page 3)
      const nivelesPrepago = [50, 100, 200, 300, 500, 800];
      const maxAhorro = Math.max(0, ...nivelesPrepago.map(m => runSim(m).ahorroNeto));

      // ── SVG Math Helpers (Page 4)
      const maxMes = mesesRestantes || 1;

                                : "Compara cómo la cuota mensual disminuye progresivamente en el tiempo según tu estrategia."}
                            </p>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ display: "flex", background: "#ECEAE6", padding: 4, borderRadius: 8, border: "1px solid #DDDAD3", height: "fit-content" }}>
                              {[{ key: "tabla", label: "Tabla" }, { key: "grafico", label: "Gráfico" }].map(v => (
                                <button
                                  key={v.key}
                                  onClick={() => setDetalleVista(v.key)}
                                  style={{
                                    padding: "6px 14px",
                                    borderRadius: 6,
                                    border: "none",
                                    fontSize: 11,
                                    fontWeight: 700,
                                    cursor: "pointer",
                                    transition: "all 0.2s",
                                    background: detalleVista === v.key ? "#185FA5" : "transparent",
                                    color: detalleVista === v.key ? "#fff" : "#6B6860"
                                  }}
                                >
                                  {v.label}
                                </button>
                              ))}
                            </div>
                            <div style={{ display: "flex", background: "#ECEAE6", padding: 4, borderRadius: 8, border: "1px solid #DDDAD3", height: "fit-content" }}>
                              {["UF", "CLP"].map(m => (
                                <button
                                  key={m}
                                  onClick={() => setMonedaTabla(m)}
                                  style={{
                                    padding: "6px 12px",
                                    borderRadius: 6,
                                    border: "none",
                                    fontSize: 10,
                                    fontWeight: 800,
                                    cursor: "pointer",
                                    transition: "all 0.2s",
                                    background: monedaTabla === m ? "#185FA5" : "transparent",
                                    color: monedaTabla === m ? "#fff" : "#6B6860"
                                  }}
                                >
                                  {m}
                                </button>
                              ))}
                            </div>
                            <div style={{ textAlign: "right", background: "#EDE8E0", padding: "12px 20px", borderRadius: 10, border: "1px solid #DDDAD3" }}>
                              <div style={{ fontSize: 10, color: "var(--accent-cyan)", fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.05em" }}>Término Proyectado</div>
                              <div style={{ fontSize: 20, fontWeight: 800, color: "#1A1915" }}>{new Date().getFullYear() + Math.floor((new Date().getMonth() + sim.mesesReales) / 12)}</div>
                            </div>
                          </div>
                        </div>

                        {detalleVista === "tabla" ? (
                          <TablaAmortizacion
                            detalle={sim.detalleMensual}
                            historial={historialPagado}
                            mesesPagados={+cr.mesesPagados}
                            startYear={creditStart.year}
                            startMonth={creditStart.month}
                            seguros={+cr.seguros}
                            moneda={monedaTabla}
                            valorUF={valorUF}
                          />
                        ) : (
                          <div style={{ position: "relative", minHeight: 500, height: "60vh" }}>
                            <GraficoCuotas evolucionCuota={sim.evolucionCuota} cuotaBase={cuotaBase + (+cr.seguros)} destino={pr.destino} valorUF={valorUF} moneda={monedaTabla} />
                          </div>
                        )}
                      </div>
                    )}
                  </div >
              </div >
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>

</html>
